<svg width="1020" viewBox="0 0 1020 540" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Entity relationship diagram: IfcRelNests establishing stationing order for IfcReferent instances</title>
  <desc>IfcAlignment is the RelatingObject of an IfcRelNests relationship whose RelatedObjects list, ordered by DistanceAlong, contains three IfcReferent instances, each with PredefinedType = STATION: P1 (DistanceAlong 0.0, the starting-station referent), P3 (DistanceAlong 400.0, a gap-equation referent), and P4 (DistanceAlong 600.0, an overlap-equation referent). Each referent carries a Pset_Stationing property set: P1 has Station = 1000.00; P3 has Station = 1700.00 and IncomingStation = 1400.00; P4 has Station = 1850.00 and IncomingStation = 1900.00. These values match the worked example in section 9.2.6.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 500; }
      .ts  { font-size: 12px; font-weight: 400; fill: #555; }
      .lbl { font-size: 11px; font-weight: 400; fill: #777; }

      /* Spatial element — purple */
      .c-purple rect  { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th   { fill: #3C3489; }
      .c-purple .ts   { fill: #534AB7; }

      /* Semantic / referent — teal */
      .c-teal rect    { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th     { fill: #085041; }
      .c-teal .ts     { fill: #0F6E56; }

      /* Relationship — gray */
      .c-gray rect    { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th     { fill: #2C2C2A; }
      .c-gray .ts     { fill: #5F5E5A; }
    </style>
  </defs>

  <!-- ── Legend (top left) ── -->
  <rect x="20" y="20" width="220" height="108" rx="6" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <text class="ts" x="130" y="38" text-anchor="middle" fill="#555">Legend</text>
  <rect x="32" y="48" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="lbl" x="50" y="59">Spatial element</text>
  <rect x="32" y="68" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="lbl" x="50" y="79">Relationship</text>
  <rect x="32" y="88" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="lbl" x="50" y="99">Referent</text>
  <rect x="32" y="108" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text class="lbl" x="50" y="119">Property set</text>

  <!-- ── IfcAlignment ── -->
  <g class="c-purple">
    <rect x="380" y="20" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="500" y="42" text-anchor="middle" dominant-baseline="central">IfcAlignment</text>
    <text class="ts" x="500" y="64" text-anchor="middle" dominant-baseline="central">horizontal / vertical layout</text>
  </g>

  <!-- arrow: IfcAlignment → IfcRelNests -->
  <line x1="500" y1="76" x2="500" y2="168" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="508" y="126">RelatingObject</text>

  <!-- ── IfcRelNests ── -->
  <g class="c-gray">
    <rect x="380" y="170" width="240" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="500" y="190" text-anchor="middle" dominant-baseline="central">IfcRelNests</text>
    <text class="ts" x="500" y="206" text-anchor="middle" dominant-baseline="central">RelatedObjects, ordered by DistanceAlong</text>
  </g>

  <!-- fan-out bus: IfcRelNests → three referents -->
  <path d="M500 218 L500 245" fill="none" stroke="#5F5E5A" stroke-width="1"/>
  <path d="M150 245 L870 245" fill="none" stroke="#5F5E5A" stroke-width="1"/>
  <text class="lbl" x="508" y="234">RelatedObjects</text>
  <line x1="150" y1="245" x2="150" y2="268" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <line x1="510" y1="245" x2="510" y2="268" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <line x1="870" y1="245" x2="870" y2="268" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

  <!-- ── IfcReferent P1 ── -->
  <g class="c-teal">
    <rect x="40" y="270" width="220" height="76" rx="8" stroke-width="0.5"/>
    <text class="th" x="150" y="290" text-anchor="middle" dominant-baseline="central">IfcReferent — P1</text>
    <text class="ts" x="150" y="308" text-anchor="middle" dominant-baseline="central">DistanceAlong = 0.0 — start</text>
    <text class="ts" x="150" y="326" text-anchor="middle" dominant-baseline="central">PredefinedType = STATION</text>
  </g>

  <!-- ── IfcReferent P3 ── -->
  <g class="c-teal">
    <rect x="400" y="270" width="220" height="76" rx="8" stroke-width="0.5"/>
    <text class="th" x="510" y="290" text-anchor="middle" dominant-baseline="central">IfcReferent — P3</text>
    <text class="ts" x="510" y="308" text-anchor="middle" dominant-baseline="central">DistanceAlong = 400.0 — gap</text>
    <text class="ts" x="510" y="326" text-anchor="middle" dominant-baseline="central">PredefinedType = STATION</text>
  </g>

  <!-- ── IfcReferent P4 ── -->
  <g class="c-teal">
    <rect x="760" y="270" width="220" height="76" rx="8" stroke-width="0.5"/>
    <text class="th" x="870" y="290" text-anchor="middle" dominant-baseline="central">IfcReferent — P4</text>
    <text class="ts" x="870" y="308" text-anchor="middle" dominant-baseline="central">DistanceAlong = 600.0 — overlap</text>
    <text class="ts" x="870" y="326" text-anchor="middle" dominant-baseline="central">PredefinedType = STATION</text>
  </g>

  <!-- arrows: referents → Pset_Stationing -->
  <line x1="150" y1="346" x2="150" y2="398" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="158" y="374">HasProperties</text>
  <line x1="510" y1="346" x2="510" y2="398" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="518" y="374">HasProperties</text>
  <line x1="870" y1="346" x2="870" y2="398" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="878" y="374">HasProperties</text>

  <!-- ── Pset_Stationing P1 ── -->
  <g class="c-teal">
    <rect x="40" y="400" width="220" height="50" rx="8" stroke-width="0.5" stroke-dasharray="4 3"/>
    <text class="th" x="150" y="418" text-anchor="middle" dominant-baseline="central">Pset_Stationing</text>
    <text class="ts" x="150" y="436" text-anchor="middle" dominant-baseline="central">Station = 1000.00</text>
  </g>

  <!-- ── Pset_Stationing P3 ── -->
  <g class="c-teal">
    <rect x="400" y="400" width="220" height="66" rx="8" stroke-width="0.5" stroke-dasharray="4 3"/>
    <text class="th" x="510" y="418" text-anchor="middle" dominant-baseline="central">Pset_Stationing</text>
    <text class="ts" x="510" y="436" text-anchor="middle" dominant-baseline="central">Station = 1700.00</text>
    <text class="ts" x="510" y="452" text-anchor="middle" dominant-baseline="central">IncomingStation = 1400.00</text>
  </g>

  <!-- ── Pset_Stationing P4 ── -->
  <g class="c-teal">
    <rect x="760" y="400" width="220" height="66" rx="8" stroke-width="0.5" stroke-dasharray="4 3"/>
    <text class="th" x="870" y="418" text-anchor="middle" dominant-baseline="central">Pset_Stationing</text>
    <text class="ts" x="870" y="436" text-anchor="middle" dominant-baseline="central">Station = 1850.00</text>
    <text class="ts" x="870" y="452" text-anchor="middle" dominant-baseline="central">IncomingStation = 1900.00</text>
  </g>

  <!-- ── Annotation ── -->
  <text class="lbl" x="510" y="510" text-anchor="middle" fill="#aaa">P2 and P5 from the §9.2.6 example are omitted — they are ordinary alignment points, not referents.</text>
</svg>
