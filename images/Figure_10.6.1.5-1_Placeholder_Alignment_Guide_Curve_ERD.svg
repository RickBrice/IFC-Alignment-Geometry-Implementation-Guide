<svg width="1300" viewBox="0 0 1300 640" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Entity relationship diagram: guide curve rootedness via placeholder IfcAlignment (§10.6.1.5)</title>
  <desc>IfcProject aggregates a placeholder IfcAlignment, A-line, via IfcRelAggregates. A-line's Representation references an IfcProductDefinitionShape containing one IfcShapeRepresentation (Axis), whose Items list holds a tagged IfcOffsetCurveByDistances (Tag = 'A'), whose BasisCurve is the Main-Line directrix curve. Separately, IfcSectionedSurface.Directrix references that same Main-Line curve, and its cross-section Tags list includes 'A' — a string-value match with the offset curve's Tag, shown as an informal dashed correlation, not a schema relationship. B-line and C-line follow the identical pattern and are noted but not fully drawn.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 500; }
      .ts  { font-size: 12px; font-weight: 400; fill: #555; }
      .lbl { font-size: 11px; font-weight: 400; fill: #777; }

      /* Rooted product / root entity — purple */
      .c-purple rect  { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th   { fill: #3C3489; }
      .c-purple .ts   { fill: #534AB7; }

      /* Representation infrastructure — blue */
      .c-blue rect    { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th     { fill: #0C447C; }
      .c-blue .ts     { fill: #185FA5; }

      /* Geometry / tag content — teal */
      .c-teal rect    { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th     { fill: #085041; }
      .c-teal .ts     { fill: #0F6E56; }

      /* Relationship — gray */
      .c-gray rect    { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th     { fill: #2C2C2A; }
      .c-gray .ts     { fill: #5F5E5A; }
    </style>
  </defs>

  <!-- ── Legend ── -->
  <rect x="980" y="20" width="280" height="108" rx="6" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <text class="ts" x="1120" y="38" text-anchor="middle" fill="#555">Legend</text>
  <rect x="992" y="48" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="lbl" x="1010" y="59">Rooted product</text>
  <rect x="992" y="68" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="lbl" x="1010" y="79">Representation infrastructure</text>
  <rect x="992" y="88" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="lbl" x="1010" y="99">Geometry / tag content</text>
  <rect x="992" y="108" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="lbl" x="1010" y="119">Relationship</text>

  <!-- ── IfcProject ── -->
  <g class="c-purple">
    <rect x="40" y="30" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="140" y="58" text-anchor="middle" dominant-baseline="central">IfcProject</text>
  </g>

  <!-- ── IfcRelAggregates ── -->
  <g class="c-gray">
    <rect x="40" y="160" width="200" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="140" y="182" text-anchor="middle" dominant-baseline="central">IfcRelAggregates</text>
  </g>

  <!-- arrow: IfcProject → IfcRelAggregates -->
  <line x1="140" y1="86" x2="140" y2="158" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="148" y="126">RelatingObject</text>

  <!-- ── IfcAlignment (placeholder) ── -->
  <g class="c-purple">
    <rect x="320" y="160" width="220" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="430" y="182" text-anchor="middle" dominant-baseline="central">IfcAlignment</text>
    <text class="ts" x="430" y="204" text-anchor="middle" dominant-baseline="central">Name = "A-line" (placeholder)</text>
  </g>

  <!-- arrow: IfcRelAggregates → IfcAlignment -->
  <line x1="240" y1="182" x2="318" y2="182" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="279" y="172" text-anchor="middle">RelatedObjects</text>

  <!-- ── IfcProductDefinitionShape ── -->
  <g class="c-blue">
    <rect x="320" y="280" width="220" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="430" y="302" text-anchor="middle" dominant-baseline="central">IfcProductDefinitionShape</text>
  </g>

  <!-- arrow: IfcAlignment → IfcProductDefinitionShape -->
  <line x1="430" y1="216" x2="430" y2="278" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="438" y="250">Representation</text>

  <!-- ── IfcShapeRepresentation ── -->
  <g class="c-blue">
    <rect x="320" y="380" width="220" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="430" y="402" text-anchor="middle" dominant-baseline="central">IfcShapeRepresentation</text>
    <text class="ts" x="430" y="424" text-anchor="middle" dominant-baseline="central">RepresentationIdentifier = "Axis"</text>
  </g>

  <!-- arrow: IfcProductDefinitionShape → IfcShapeRepresentation -->
  <line x1="430" y1="324" x2="430" y2="378" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="438" y="356">Representations</text>

  <!-- ── IfcOffsetCurveByDistances ── -->
  <g class="c-teal">
    <rect x="320" y="490" width="220" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="430" y="512" text-anchor="middle" dominant-baseline="central">IfcOffsetCurveByDistances</text>
    <text class="ts" x="430" y="534" text-anchor="middle" dominant-baseline="central">Tag = "A"</text>
  </g>

  <!-- arrow: IfcShapeRepresentation → IfcOffsetCurveByDistances -->
  <line x1="430" y1="436" x2="430" y2="488" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="438" y="466">Items</text>

  <!-- ── Main-Line basis curve ── -->
  <g class="c-blue">
    <rect x="660" y="490" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="780" y="512" text-anchor="middle" dominant-baseline="central">Main-Line curve</text>
    <text class="ts" x="780" y="534" text-anchor="middle" dominant-baseline="central">(IfcGradientCurve)</text>
  </g>

  <!-- arrow: IfcOffsetCurveByDistances → Main-Line curve -->
  <line x1="540" y1="518" x2="658" y2="518" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="599" y="508" text-anchor="middle">BasisCurve</text>

  <!-- ── IfcSectionedSurface ── -->
  <g class="c-teal">
    <rect x="980" y="380" width="240" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="1100" y="402" text-anchor="middle" dominant-baseline="central">IfcSectionedSurface</text>
  </g>

  <!-- arrow: IfcSectionedSurface → Main-Line curve (Directrix) -->
  <path d="M980 410 L920 410 L920 518 L902 518" fill="none" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="lbl" x="912" y="466" text-anchor="end">Directrix</text>

  <!-- ── Tag list annotation ── -->
  <g class="c-teal">
    <rect x="980" y="490" width="240" height="56" rx="8" stroke-width="0.5" stroke-dasharray="4 3"/>
    <text class="th" x="1100" y="512" text-anchor="middle" dominant-baseline="central">Tags</text>
    <text class="ts" x="1100" y="534" text-anchor="middle" dominant-baseline="central">CrossSections[i].Tags = ["A","B","C"]</text>
  </g>

  <!-- arrow: IfcSectionedSurface → Tag list annotation -->
  <line x1="1100" y1="424" x2="1100" y2="488" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

  <!-- dashed correlation: IfcOffsetCurveByDistances.Tag ↔ Tags list -->
  <path d="M540 518 L980 518" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="lbl" x="760" y="568" text-anchor="middle">Tag value equality — informal correlation, not an IFC relationship</text>

  <!-- ── Footer note ── -->
  <text class="lbl" x="430" y="610" text-anchor="middle" fill="#aaa">"B-line" and "C-line" follow the same pattern (each with its own IfcRelAggregates and IfcAlignment) — omitted here for clarity.</text>
</svg>
