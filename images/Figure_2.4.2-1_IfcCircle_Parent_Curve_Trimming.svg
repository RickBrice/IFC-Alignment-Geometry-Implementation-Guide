<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 640" width="700" height="640"
     font-family="Georgia, 'Times New Roman', serif">

  <rect width="700" height="640" fill="#f8f7f4"/>

  <defs>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d8d4c8" stroke-width="0.5"/>
    </pattern>
    <marker id="gArrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1a3a5c"/>
    </marker>
    <marker id="lArrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c0392b"/>
    </marker>
    <marker id="rArrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#555"/>
    </marker>
    <marker id="rArrowRev" markerWidth="7" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <path d="M7,0 L7,7 L0,3.5 z" fill="#555"/>
    </marker>
    <marker id="segArrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1a7a3c"/>
    </marker>
  </defs>

  <rect width="700" height="640" fill="url(#grid)"/>

  <!-- GLOBAL AXES -->
  <line x1="70" y1="560" x2="660" y2="560"
        stroke="#1a3a5c" stroke-width="1.5" marker-end="url(#gArrow)"/>
  <line x1="300" y1="600" x2="300" y2="65"
        stroke="#1a3a5c" stroke-width="1.5" marker-end="url(#gArrow)"/>
  <text x="666" y="564" font-size="15" fill="#1a3a5c" font-style="italic">X</text>
  <text x="290" y="58"  font-size="15" fill="#1a3a5c" font-style="italic">Y</text>

  <circle cx="300" cy="560" r="3" fill="#1a3a5c"/>
  <text x="310" y="578" font-size="11" fill="#1a3a5c">(0, 0)</text>

  <!-- IFCCIRCLE -->
  <circle cx="300" cy="320" r="240"
          fill="none" stroke="#1a3a5c" stroke-width="1.5"
          stroke-dasharray="8,5"/>

  <text x="548" y="316" font-size="11" fill="#1a3a5c" font-style="italic">IfcCircle</text>
  <line x1="544" y1="319" x2="522" y2="322" stroke="#1a3a5c" stroke-width="0.8"/>

  <!-- CIRCLE CENTER -->
  <circle cx="300" cy="320" r="4" fill="#1a3a5c"/>
  <text x="312" y="314" font-size="11" fill="#1a3a5c">(0, 300)</text>

  <!-- RADIUS DIMENSION -->
  <line x1="300" y1="298" x2="540" y2="298"
        stroke="#555" stroke-width="0.9"
        marker-start="url(#rArrowRev)" marker-end="url(#rArrow)"/>
  <line x1="300" y1="288" x2="300" y2="308" stroke="#555" stroke-width="0.8"/>
  <line x1="540" y1="288" x2="540" y2="308" stroke="#555" stroke-width="0.8"/>
  <text x="420" y="290" font-size="12" fill="#555" text-anchor="middle" font-style="italic">R = 300</text>
  <circle cx="540" cy="320" r="3" fill="#555"/>

  <!-- RADIAL LINES -->
  <line x1="300" y1="324" x2="300" y2="556"
        stroke="#888" stroke-width="0.8" stroke-dasharray="5,4"/>
  <line x1="300" y1="324" x2="376" y2="543"
        stroke="#888" stroke-width="0.8" stroke-dasharray="5,4"/>

  <!-- Arc angle indicator -->
  <path d="M 300 360 A 40 40 0 0 1 313.1 357.8"
        fill="none" stroke="#888" stroke-width="1"/>
  <text x="320" y="372" font-size="11" fill="#888" font-style="italic">s/R</text>

  <!-- IFCCURVESEGMENT -->
  <path d="M 300 560 A 240 240 0 0 0 378.526 546.682"
        fill="none" stroke="#1a7a3c" stroke-width="4" stroke-linecap="round"/>

  <circle cx="300"     cy="560"     r="5.5" fill="#1a7a3c"/>
  <circle cx="378.526" cy="546.682" r="5.5" fill="#1a7a3c"/>

  <line x1="378.526" y1="546.682" x2="416.3" y2="533.6"
        stroke="#1a7a3c" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#segArrow)"/>

  <text x="422" y="570" font-size="11" fill="#1a7a3c" font-style="italic">IfcCurveSegment</text>
  <line x1="418" y1="567" x2="394" y2="553" stroke="#1a7a3c" stroke-width="0.8"/>

  <text x="254" y="558" font-size="11" fill="#1a7a3c" text-anchor="end" font-style="italic">s = 0</text>
  <text x="395" y="530" font-size="11" fill="#1a7a3c" text-anchor="middle" font-style="italic">s = 100</text>

  <!-- LOCAL COORDINATE AXES -->
  <line x1="300" y1="320" x2="300" y2="588"
        stroke="#c0392b" stroke-width="1.8" marker-end="url(#lArrow)"/>
  <line x1="300" y1="320" x2="566" y2="320"
        stroke="#c0392b" stroke-width="1.8" marker-end="url(#lArrow)"/>

  <text x="312" y="600" font-size="15" fill="#c0392b" font-style="italic">x</text>
  <text x="572" y="325" font-size="15" fill="#c0392b" font-style="italic">y</text>

  <rect x="295" y="315" width="10" height="10"
        fill="none" stroke="#c0392b" stroke-width="1.2"/>

  <!-- LEGEND -->
  <g transform="translate(80, 100)">
    <rect x="-8" y="-16" width="206" height="72"
          fill="#f8f7f4" stroke="#ccc" stroke-width="0.75" rx="3"/>
    <line x1="0" y1="0" x2="28" y2="0" stroke="#1a3a5c" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="34" y="4" font-size="11" fill="#333">IfcCircle (global)</text>
    <line x1="0" y1="22" x2="28" y2="22" stroke="#c0392b" stroke-width="1.5"/>
    <text x="34" y="26" font-size="11" fill="#333">Local coordinates</text>
    <line x1="0" y1="44" x2="28" y2="44" stroke="#1a7a3c" stroke-width="3"/>
    <text x="34" y="48" font-size="11" fill="#333">IfcCurveSegment</text>
  </g>

</svg>
