<svg xmlns="http://www.w3.org/2000/svg" width="620" height="400" viewBox="0 0 620 400">
  <defs>
    <marker id="ah" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0,0 6,2.5 0,5" fill="#555"/>
    </marker>
  </defs>

  <rect width="620" height="400" fill="white"/>

  <!-- Ground plane -->
  <polygon points="40,385 580,385 430,240 170,240" fill="#f0f2f0" stroke="#c0c4c0" stroke-width="0.8"/>

  <!-- Ground grid — horizontal lines at interpolated depths -->
  <g stroke="#d5d8d5" stroke-width="0.6">
    <line x1="67" y1="355" x2="549" y2="355"/>
    <line x1="98" y1="320" x2="513" y2="320"/>
    <line x1="134" y1="280" x2="471" y2="280"/>
  </g>

  <!-- Ground grid — longitudinal lines converging toward far edge -->
  <g stroke="#d5d8d5" stroke-width="0.6">
    <line x1="40"  y1="385" x2="170" y2="240"/>
    <line x1="148" y1="385" x2="222" y2="240"/>
    <line x1="256" y1="385" x2="274" y2="240"/>
    <line x1="310" y1="385" x2="300" y2="240"/>
    <line x1="364" y1="385" x2="326" y2="240"/>
    <line x1="472" y1="385" x2="378" y2="240"/>
    <line x1="580" y1="385" x2="430" y2="240"/>
  </g>

  <!-- Drop lines from survey points to their ground projections -->
  <g stroke="#b8bcb8" stroke-width="1" stroke-dasharray="4,3">
    <line x1="80"  y1="340" x2="80"  y2="375"/>
    <line x1="165" y1="280" x2="165" y2="354"/>
    <line x1="250" y1="240" x2="250" y2="328"/>
    <line x1="315" y1="215" x2="315" y2="308"/>
    <line x1="390" y1="228" x2="390" y2="318"/>
    <line x1="460" y1="265" x2="460" y2="343"/>
    <line x1="535" y1="318" x2="535" y2="362"/>
  </g>

  <!-- Ground projection dots -->
  <g fill="#b0b4b0">
    <circle cx="80"  cy="375" r="2.5"/>
    <circle cx="165" cy="354" r="2.5"/>
    <circle cx="250" cy="328" r="2.5"/>
    <circle cx="315" cy="308" r="2.5"/>
    <circle cx="390" cy="318" r="2.5"/>
    <circle cx="460" cy="343" r="2.5"/>
    <circle cx="535" cy="362" r="2.5"/>
  </g>

  <!-- True alignment — smooth reference (dashed gray) -->
  <path d="M 80,340
           C 108,320 137,297 165,280
           C 193,263 225,251 250,240
           C 275,229 292,217 315,215
           C 338,213 366,236 390,228
           C 414,236 436,280 460,265
           C 484,280 510,336 535,318"
        stroke="#9aa09a" stroke-width="1.5" stroke-dasharray="7,4" fill="none"/>

  <!-- Survey-derived polyline -->
  <polyline points="80,340 165,280 250,240 315,215 390,228 460,265 535,318"
            stroke="#1565C0" stroke-width="2.5" fill="none" stroke-linejoin="miter"/>

  <!-- Survey point markers — diamond symbols -->
  <g fill="#1565C0" stroke="white" stroke-width="1.2">
    <polygon points="80,333  87,340  80,347  73,340"/>
    <polygon points="165,273 172,280 165,287 158,280"/>
    <polygon points="250,233 257,240 250,247 243,240"/>
    <polygon points="315,208 322,215 315,222 308,215"/>
    <polygon points="390,221 397,228 390,235 383,228"/>
    <polygon points="460,258 467,265 460,272 453,265"/>
    <polygon points="535,311 542,318 535,325 528,318"/>
  </g>

  <!-- Point labels -->
  <g font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1565C0">
    <text x="57"  y="336">P&#x2080;</text>
    <text x="147" y="274">P&#x2081;</text>
    <text x="258" y="234">P&#x2082;</text>
    <text x="323" y="208">P&#x2083;</text>
    <text x="398" y="221">P&#x2084;</text>
    <text x="468" y="259">P&#x2085;</text>
    <text x="543" y="312">P&#x2086;</text>
  </g>

  <!-- Elevation bracket annotation on highest point (P3) -->
  <g stroke="#888" stroke-width="1" fill="none">
    <line x1="328" y1="215" x2="345" y2="215"/>
    <line x1="328" y1="308" x2="345" y2="308"/>
    <line x1="340" y1="215" x2="340" y2="308"/>
    <line x1="337" y1="218" x2="340" y2="215" stroke="#888"/>
    <line x1="343" y1="218" x2="340" y2="215" stroke="#888"/>
    <line x1="337" y1="305" x2="340" y2="308" stroke="#888"/>
    <line x1="343" y1="305" x2="340" y2="308" stroke="#888"/>
  </g>
  <text x="345" y="265" font-family="Arial, sans-serif" font-size="10" fill="#666" font-style="italic">elevation</text>

  <!-- Axis indicator (bottom-left) -->
  <g stroke="#555" stroke-width="1.5" font-family="Arial, sans-serif" font-size="10" fill="#555">
    <line x1="50" y1="370" x2="76" y2="370" marker-end="url(#ah)"/>
    <text x="79" y="374">x</text>
    <line x1="50" y1="370" x2="64" y2="356" marker-end="url(#ah)"/>
    <text x="67" y="353">y</text>
    <line x1="50" y1="370" x2="50" y2="345" marker-end="url(#ah)"/>
    <text x="53" y="342">z</text>
  </g>

  <!-- Legend -->
  <rect x="20" y="18" width="208" height="58" fill="white" stroke="#ccc" rx="4" fill-opacity="0.95"/>
  <polyline points="30,38 80,38" stroke="#1565C0" stroke-width="2.5" fill="none"/>
  <polygon points="55,31 62,38 55,45 48,38" fill="#1565C0" stroke="white" stroke-width="1.2"/>
  <text x="88" y="42" font-family="Arial, sans-serif" font-size="11" fill="#333">Survey-derived polyline</text>
  <line x1="30" y1="62" x2="80" y2="62" stroke="#9aa09a" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="88" y="66" font-family="Arial, sans-serif" font-size="11" fill="#333">True alignment (smooth)</text>
</svg>
