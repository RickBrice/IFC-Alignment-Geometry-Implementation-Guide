<svg width="680" height="500" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Curved alignment in plan with bridge pier and drain inlet positioned by station and lateral offset</title>
  <desc>A curved horizontal alignment arc runs across the figure. A bridge pier is placed to the left of the alignment at a given station with a lateral offset labelled Lt. A drain inlet is placed to the right at a later station with a lateral offset labelled Rt. The pier is annotated with station and lateral offset; the drain inlet is also annotated with its grate elevation.</desc>

  <defs>
    <style>
      text { font-family: sans-serif; fill: #3d3d3a; }
      .th  { font-size: 14px; font-weight: 500; }
      .ts  { font-size: 12px; font-weight: 400; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowsm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Alignment arc -->
  <path d="M 60,400 C 180,380 300,200 560,120"
        fill="none" stroke="#73726c" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Station direction arrow mid-arc -->
  <line x1="242" y1="292" x2="272" y2="274"
        stroke="#73726c" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── PIER (Lt.) ── -->
  <!-- Station tick at (192,331) -->
  <line x1="187" y1="325" x2="197" y2="337"
        stroke="#73726c" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Station label -->
  <text class="ts" x="200" y="348" fill="#73726c">Sta. 142+35.75</text>

  <!-- Offset arrow Lt. -->
  <line x1="192" y1="331" x2="158" y2="283"
        stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrowsm)" stroke-linecap="round"/>
  <text class="ts" x="168" y="302" fill="#185FA5" text-anchor="end">Lt. 12.50 ft</text>

  <!-- Bridge pier symbol -->
  <rect x="139" y="267" width="24" height="14" rx="1"
        fill="#73726c" opacity="0.75"/>
  <line x1="139" y1="267" x2="163" y2="281" stroke="#ffffff" stroke-width="0.8"/>
  <line x1="163" y1="267" x2="139" y2="281" stroke="#ffffff" stroke-width="0.8"/>

  <!-- Pier label (no elevation; read separately from a profile view, per Case 1) -->
  <text class="th" x="151" y="258" fill="#3d3d3a" text-anchor="middle">Bridge pier</text>

  <!-- ── DRAIN INLET (Rt.) ── -->
  <!-- Station tick at (306,247) -->
  <line x1="302" y1="241" x2="311" y2="254"
        stroke="#73726c" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Station label -->
  <text class="ts" x="298" y="236" fill="#73726c" text-anchor="end">Sta. 198+12.42</text>

  <!-- Offset arrow Rt. -->
  <line x1="306" y1="247" x2="331" y2="283"
        stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrowsm)" stroke-linecap="round"/>
  <text class="ts" x="328" y="262" fill="#854F0B">Rt. 18.0 ft</text>

  <!-- Drain inlet symbol -->
  <circle cx="337" cy="292" r="12" fill="none" stroke="#73726c" stroke-width="1.5"/>
  <circle cx="337" cy="292" r="7"  fill="none" stroke="#73726c" stroke-width="1"/>
  <circle cx="337" cy="292" r="2"  fill="#73726c" opacity="0.6"/>
  <line x1="325" y1="292" x2="349" y2="292" stroke="#73726c" stroke-width="0.8" opacity="0.5"/>
  <line x1="337" y1="280" x2="337" y2="304" stroke="#73726c" stroke-width="0.8" opacity="0.5"/>

  <!-- Drain labels -->
  <text class="th" x="337" y="316" fill="#3d3d3a" text-anchor="middle">Drain inlet</text>
  <text class="ts" x="337" y="330" fill="#73726c" text-anchor="middle">Elev. 312.75 ft (NAVD88)</text>

  <!-- Legend -->
  <rect x="430" y="340" width="220" height="130" rx="8"
        fill="#f1efe8" opacity="0.93" stroke="#b4b2a9" stroke-width="0.5"/>
  <text class="th" x="446" y="362" fill="#3d3d3a">Legend</text>

  <line x1="446" y1="380" x2="490" y2="380"
        stroke="#73726c" stroke-width="2.5"/>
  <text class="ts" x="498" y="384" fill="#3d3d3a">Alignment centreline</text>

  <rect x="452" y="396" width="18" height="10" rx="1"
        fill="#73726c" opacity="0.75"/>
  <line x1="452" y1="396" x2="470" y2="406" stroke="#ffffff" stroke-width="0.8"/>
  <line x1="470" y1="396" x2="452" y2="406" stroke="#ffffff" stroke-width="0.8"/>
  <text class="ts" x="498" y="405" fill="#3d3d3a">Bridge pier (plan)</text>

  <circle cx="461" cy="425" r="8"  fill="none" stroke="#73726c" stroke-width="1.5"/>
  <circle cx="461" cy="425" r="3"  fill="none" stroke="#73726c" stroke-width="1"/>
  <line x1="453" y1="425" x2="469" y2="425" stroke="#73726c" stroke-width="0.8" opacity="0.5"/>
  <line x1="461" y1="417" x2="461" y2="433" stroke="#73726c" stroke-width="0.8" opacity="0.5"/>
  <text class="ts" x="498" y="429" fill="#3d3d3a">Drain inlet (plan)</text>

  <line x1="490" y1="450" x2="446" y2="450"
        stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrowsm)"/>
  <text class="ts" x="498" y="454" fill="#3d3d3a">Lt. &#x2014; left offset</text>

  <line x1="446" y1="465" x2="490" y2="465"
        stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrowsm)"/>
  <text class="ts" x="498" y="469" fill="#3d3d3a">Rt. &#x2014; right offset</text>
</svg>
