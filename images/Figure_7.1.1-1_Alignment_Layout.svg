<svg width="1040" height="390" viewBox="0 0 1040 390" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Alignment layout for the reusing-horizontal-layout pattern</title>
  <desc>IfcAlignment (parent) nests IfcAlignmentHorizontal via IfcRelNests and aggregates two child alignments via IfcRelAggregates. Child A (rail) nests both IfcAlignmentVertical and IfcAlignmentCant. Child B (road) nests only IfcAlignmentVertical.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 500; }
      .ts  { font-size: 12px; font-weight: 400; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th  { fill: #3C3489; }
      .c-purple .ts  { fill: #534AB7; }
      .c-gray rect   { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th    { fill: #2C2C2A; }
      .c-gray .ts    { fill: #5F5E5A; }
      .c-amber rect  { fill: #FEF3E2; stroke: #B45309; }
      .c-amber .th   { fill: #7C3D0A; }
      .c-amber .ts   { fill: #B45309; }
      .c-blue rect   { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th    { fill: #0C447C; }
      .c-blue .ts    { fill: #185FA5; }
      .c-green rect  { fill: #E1F5EE; stroke: #0F6E56; }
      .c-green .th   { fill: #085041; }
      .c-green .ts   { fill: #0F6E56; }
      .muted { fill: #888; font-size: 11px; }
    </style>
  </defs>

  <!-- ═══════════════════════════════════════════════════════ ROW 1: parent -->

  <!-- IfcAlignment (parent) — centered at x=500 -->
  <g class="c-purple">
    <rect x="395" y="20" width="210" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="500" y="38" text-anchor="middle" dominant-baseline="central">IfcAlignment</text>
    <text class="ts" x="500" y="56" text-anchor="middle" dominant-baseline="central">(parent)</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════ ROW 2: relationships -->

  <!-- Arrow: parent → IfcRelNests -->
  <path d="M437 64 L175 114" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="muted" x="285" y="88" text-anchor="middle">RelatingObject</text>

  <!-- Arrow: parent → IfcRelAggregates -->
  <path d="M563 64 L685 114" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="muted" x="638" y="88" text-anchor="middle">RelatingObject</text>

  <!-- IfcRelNests (horizontal layout) — centered at x=155 -->
  <g class="c-gray">
    <rect x="35" y="116" width="240" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="155" y="133" text-anchor="middle" dominant-baseline="central">IfcRelNests</text>
    <text class="ts" x="155" y="151" text-anchor="middle" dominant-baseline="central">(horizontal layout)</text>
  </g>

  <!-- IfcRelAggregates — centered at x=685 -->
  <g class="c-amber">
    <rect x="565" y="116" width="240" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="685" y="133" text-anchor="middle" dominant-baseline="central">IfcRelAggregates</text>
    <text class="ts" x="685" y="151" text-anchor="middle" dominant-baseline="central">(child alignments)</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════ ROW 3: layout entities + children -->

  <!-- Arrow: IfcRelNests → IfcAlignmentHorizontal -->
  <path d="M155 160 L155 210" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="muted" x="163" y="188">RelatedObjects</text>

  <!-- Spine: IfcRelAggregates → child A (x=500) and child B (x=870) -->
  <path d="M685 160 L685 186 L500 186" fill="none" stroke="#888" stroke-width="1"/>
  <path d="M685 186 L870 186" fill="none" stroke="#888" stroke-width="1"/>
  <path d="M500 186 L500 210" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M870 186 L870 210" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="muted" x="685" y="180" text-anchor="middle">RelatedObjects</text>

  <!-- IfcAlignmentHorizontal (shared) — centered at x=155 -->
  <g class="c-blue">
    <rect x="30" y="212" width="250" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="155" y="229" text-anchor="middle" dominant-baseline="central">IfcAlignmentHorizontal</text>
    <text class="ts" x="155" y="247" text-anchor="middle" dominant-baseline="central">(shared)</text>
  </g>

  <!-- Child A (rail with cant) — centered at x=500 -->
  <g class="c-purple">
    <rect x="385" y="212" width="230" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="500" y="229" text-anchor="middle" dominant-baseline="central">IfcAlignment</text>
    <text class="ts" x="500" y="247" text-anchor="middle" dominant-baseline="central">(child A — rail with cant)</text>
  </g>

  <!-- Child B (road, no cant) — centered at x=870 -->
  <g class="c-purple">
    <rect x="755" y="212" width="230" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="870" y="229" text-anchor="middle" dominant-baseline="central">IfcAlignment</text>
    <text class="ts" x="870" y="247" text-anchor="middle" dominant-baseline="central">(child B — road, no cant)</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════ ROW 4: leaf entities -->

  <!-- Spine: child A → V1 (x=380) and Cant (x=620) via branch at y=278 -->
  <path d="M500 256 L500 278 L380 278" fill="none" stroke="#888" stroke-width="1"/>
  <path d="M500 278 L620 278" fill="none" stroke="#888" stroke-width="1"/>
  <path d="M380 278 L380 306" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M620 278 L620 306" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="muted" x="508" y="270">IfcRelNests</text>

  <!-- Arrow: child B → V2 -->
  <path d="M870 256 L870 306" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="muted" x="878" y="284">IfcRelNests</text>

  <!-- IfcAlignmentVertical V1 — centered at x=380 -->
  <g class="c-blue">
    <rect x="255" y="308" width="250" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="380" y="325" text-anchor="middle" dominant-baseline="central">IfcAlignmentVertical</text>
    <text class="ts" x="380" y="343" text-anchor="middle" dominant-baseline="central">(V1)</text>
  </g>

  <!-- IfcAlignmentCant C1 — centered at x=620 -->
  <g class="c-green">
    <rect x="510" y="308" width="220" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="620" y="325" text-anchor="middle" dominant-baseline="central">IfcAlignmentCant</text>
    <text class="ts" x="620" y="343" text-anchor="middle" dominant-baseline="central">(C1)</text>
  </g>

  <!-- IfcAlignmentVertical V2 — centered at x=870 -->
  <g class="c-blue">
    <rect x="750" y="308" width="240" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="870" y="325" text-anchor="middle" dominant-baseline="central">IfcAlignmentVertical</text>
    <text class="ts" x="870" y="343" text-anchor="middle" dominant-baseline="central">(V2)</text>
  </g>

</svg>
