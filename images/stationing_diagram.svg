<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" width="820" height="430" font-family="'Georgia', serif">

  <defs>
    <marker id="arrowOrange" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#e67e22"/>
    </marker>
    <marker id="arrowOrangeL" markerWidth="6" markerHeight="6" refX="1" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L6,3 z" fill="#e67e22"/>
    </marker>
    <marker id="arrowGreen" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arrowGreenL" markerWidth="6" markerHeight="6" refX="1" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L6,3 z" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="430" fill="#f9f7f4"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e" letter-spacing="0.5">Geometric Distance vs. Station Label Axes</text>
  <text x="410" y="48" text-anchor="middle" font-size="11" fill="#555" font-style="italic">Showing a Station Equation Gap (at R₃) and Overlap (at R₄)</text>

  <!-- ══════════════════════════════════════════════
       TOP PANEL — Geometric distance axis
       ══════════════════════════════════════════════ -->

  <rect x="40" y="65" width="740" height="120" rx="6" fill="#eef2f8" stroke="#b0bcd4" stroke-width="1"/>
  <text x="55" y="84" font-size="11" font-weight="bold" fill="#1a1a2e" letter-spacing="0.3">Geometric Distance Axis  (uniform, no breaks)</text>

  <!-- Axis line -->
  <line x1="80" y1="135" x2="740" y2="135" stroke="#1a1a2e" stroke-width="2.5"/>
  <polygon points="740,135 730,130 730,140" fill="#1a1a2e"/>
  <text x="750" y="139" font-size="10" fill="#1a1a2e">d</text>

  <!-- R1 d=0 -->
  <line x1="100" y1="128" x2="100" y2="142" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="100" y="123" text-anchor="middle" font-size="10" fill="#1a1a2e">R₁</text>
  <text x="100" y="157" text-anchor="middle" font-size="9" fill="#444">d = 0</text>

  <!-- R2 d=200 -->
  <line x1="240" y1="128" x2="240" y2="142" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="240" y="123" text-anchor="middle" font-size="10" fill="#1a1a2e">R₂</text>
  <text x="240" y="157" text-anchor="middle" font-size="9" fill="#444">d = 200</text>

  <!-- R3 d=400 -->
  <line x1="380" y1="128" x2="380" y2="142" stroke="#c0392b" stroke-width="2"/>
  <text x="380" y="123" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">R₃</text>
  <text x="380" y="157" text-anchor="middle" font-size="9" fill="#c0392b">d = 400</text>

  <!-- R4 d=600 -->
  <line x1="530" y1="128" x2="530" y2="142" stroke="#27ae60" stroke-width="2"/>
  <text x="530" y="123" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">R₄</text>
  <text x="530" y="157" text-anchor="middle" font-size="9" fill="#27ae60">d = 600</text>

  <!-- R5 d=800 -->
  <line x1="680" y1="128" x2="680" y2="142" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="680" y="123" text-anchor="middle" font-size="10" fill="#1a1a2e">R₅</text>
  <text x="680" y="157" text-anchor="middle" font-size="9" fill="#444">d = 800</text>

  <!-- Uniform spacing annotation -->
  <line x1="100" y1="170" x2="680" y2="170" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="390" y="181" text-anchor="middle" font-size="9" fill="#888" font-style="italic">uniform geometric spacing</text>

  <!-- ══════════════════════════════════════════════
       VERTICAL DASHED CONNECTORS
       ══════════════════════════════════════════════ -->

  <line x1="100" y1="185" x2="100" y2="272" stroke="#666" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="240" y1="185" x2="240" y2="272" stroke="#666" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="380" y1="185" x2="380" y2="272" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="530" y1="185" x2="530" y2="272" stroke="#27ae60" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="680" y1="185" x2="680" y2="272" stroke="#666" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- ══════════════════════════════════════════════
       BOTTOM PANEL — Station label axis
       ══════════════════════════════════════════════ -->

  <rect x="40" y="200" width="740" height="200" rx="6" fill="#fdf4f4" stroke="#d4b0b0" stroke-width="1"/>
  <text x="55" y="219" font-size="11" font-weight="bold" fill="#1a1a2e" letter-spacing="0.3">Station Label Axis  (gap and overlap each occur at a single point)</text>

  <!-- Station axis line -->
  <line x1="80" y1="310" x2="740" y2="310" stroke="#1a1a2e" stroke-width="2.5"/>
  <polygon points="740,310 730,305 730,315" fill="#1a1a2e"/>
  <text x="750" y="314" font-size="10" fill="#1a1a2e">s</text>

  <!-- R1: sta 10+00 -->
  <line x1="100" y1="303" x2="100" y2="317" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="100" y="298" text-anchor="middle" font-size="10" fill="#1a1a2e">R₁</text>
  <text x="100" y="332" text-anchor="middle" font-size="9" fill="#444">10+00</text>

  <!-- R2: sta 12+00 -->
  <line x1="240" y1="303" x2="240" y2="317" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="240" y="298" text-anchor="middle" font-size="10" fill="#1a1a2e">R₂</text>
  <text x="240" y="332" text-anchor="middle" font-size="9" fill="#444">12+00</text>

  <!-- R3: GAP point — in=14+00, out=17+00 -->
  <line x1="380" y1="303" x2="380" y2="317" stroke="#c0392b" stroke-width="2.5"/>
  <text x="380" y="298" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">R₃</text>
  <text x="353" y="330" text-anchor="middle" font-size="8.5" fill="#c0392b">in: 14+00</text>
  <text x="409" y="330" text-anchor="middle" font-size="8.5" fill="#c0392b">out: 17+00</text>
  <!-- Gap annotation: two-headed arrow above tick, with label -->
  <line x1="353" y1="268" x2="409" y2="268" stroke="#e67e22" stroke-width="1.5"
        marker-start="url(#arrowOrangeL)" marker-end="url(#arrowOrange)"/>
  <text x="381" y="262" text-anchor="middle" font-size="8.5" fill="#e67e22" font-weight="bold">GAP  +300</text>
  <!-- vertical dashed line from tick up to arrow -->
  <line x1="380" y1="303" x2="380" y2="273" stroke="#e67e22" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- R4: OVERLAP point — in=19+00, out=18+50 -->
  <line x1="530" y1="303" x2="530" y2="317" stroke="#27ae60" stroke-width="2.5"/>
  <text x="530" y="298" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">R₄</text>
  <text x="503" y="330" text-anchor="middle" font-size="8.5" fill="#27ae60">in: 19+00</text>
  <text x="559" y="330" text-anchor="middle" font-size="8.5" fill="#27ae60">out: 18+50</text>
  <!-- Overlap annotation: fold-back arc above tick -->
  <path d="M 508 268 Q 530 248 552 268" fill="none" stroke="#27ae60" stroke-width="1.5"
        marker-start="url(#arrowGreenL)" marker-end="url(#arrowGreen)"/>
  <text x="530" y="245" text-anchor="middle" font-size="8.5" fill="#27ae60" font-weight="bold">OVERLAP  −50</text>
  <line x1="530" y1="303" x2="530" y2="273" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- R5: sta 20+50 -->
  <line x1="680" y1="303" x2="680" y2="317" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="680" y="298" text-anchor="middle" font-size="10" fill="#1a1a2e">R₅</text>
  <text x="680" y="332" text-anchor="middle" font-size="9" fill="#444">20+50</text>

  <!-- Legend -->
  <line x1="58" y1="358" x2="78" y2="358" stroke="#e67e22" stroke-width="1.5"
        marker-start="url(#arrowOrangeL)" marker-end="url(#arrowOrange)"/>
  <text x="85" y="362" font-size="9" fill="#444">Gap: out &gt; in — station labels jump forward at that point</text>
  <path d="M 358 358 Q 370 348 382 358" fill="none" stroke="#27ae60" stroke-width="1.5"
        marker-start="url(#arrowGreenL)" marker-end="url(#arrowGreen)"/>
  <text x="390" y="362" font-size="9" fill="#444">Overlap: out &lt; in — station labels fold back at that point</text>




</svg>
