<svg width="1300" viewBox="0 0 1300 600" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Entity relationship diagram: guide curve rootedness via sibling representation (§10.6.2.5)</title>
  <desc>IfcPavement's IfcProductDefinitionShape carries two sibling IfcShapeRepresentation entries in its Representations list: Body (SolidModel), containing the IfcSectionedSolidHorizontal, and Axis (GeometricCurveSet), containing six tagged IfcOffsetCurveByDistances guide curves (Tag = 'A_top', 'B_top', 'C_top', 'A_bot', 'B_bot', 'C_bot'). No placeholder IfcAlignment or other rooted host entity exists for the guide curves; they inherit rootedness through the same IfcProductDefinitionShape as the solid.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 500; }
      .ts  { font-size: 12px; font-weight: 400; fill: #555; }
      .lbl { font-size: 11px; font-weight: 400; fill: #777; }

      /* Rooted product / root entity — purple */
      .c-purple rect  { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th   { fill: #3C3489; }
      .c-purple .ts   { fill: #534AB7; }

      /* Representation infrastructure — blue */
      .c-blue rect    { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th     { fill: #0C447C; }
      .c-blue .ts     { fill: #185FA5; }

      /* Geometry / tag content — teal */
      .c-teal rect    { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th     { fill: #085041; }
      .c-teal .ts     { fill: #0F6E56; }

      /* Relationship — gray */
      .c-gray rect    { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th     { fill: #2C2C2A; }
      .c-gray .ts     { fill: #5F5E5A; }
    </style>
  </defs>

  <!-- ── Legend ── -->
  <rect x="40" y="20" width="280" height="108" rx="6" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <text class="ts" x="180" y="38" text-anchor="middle" fill="#555">Legend</text>
  <rect x="52" y="48" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="lbl" x="70" y="59">Rooted product</text>
  <rect x="52" y="68" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="lbl" x="70" y="79">Representation infrastructure</text>
  <rect x="52" y="88" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="lbl" x="70" y="99">Geometry / tag content</text>
  <rect x="52" y="108" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="lbl" x="70" y="119">Relationship</text>

  <!-- ── Dashed enclosure: same IfcProductDefinitionShape.Representations list ── -->
  <rect x="630" y="80" width="610" height="456" rx="10" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="6 4"/>
  <text class="lbl" x="935" y="66" text-anchor="middle">Representations = [Body, Axis] — same IfcProductDefinitionShape.Representations list (ordered, sibling entries)</text>

  <!-- ── IfcPavement ── -->
  <g class="c-purple">
    <rect x="40" y="220" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="140" y="248" text-anchor="middle" dominant-baseline="central">IfcPavement</text>
  </g>

  <!-- ── IfcProductDefinitionShape ── -->
  <g class="c-blue">
    <rect x="330" y="224" width="220" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="440" y="248" text-anchor="middle" dominant-baseline="central">IfcProductDefinitionShape</text>
  </g>

  <!-- arrow: IfcPavement → IfcProductDefinitionShape -->
  <line x1="240" y1="248" x2="328" y2="248" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="284" y="238" text-anchor="middle">Representation</text>

  <!-- ── IfcShapeRepresentation "Body" ── -->
  <g class="c-blue">
    <rect x="650" y="100" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="770" y="122" text-anchor="middle" dominant-baseline="central">IfcShapeRepresentation</text>
    <text class="ts" x="770" y="144" text-anchor="middle" dominant-baseline="central">"Body" / SolidModel</text>
  </g>

  <!-- ── IfcShapeRepresentation "Axis" ── -->
  <g class="c-blue">
    <rect x="650" y="353" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="770" y="375" text-anchor="middle" dominant-baseline="central">IfcShapeRepresentation</text>
    <text class="ts" x="770" y="397" text-anchor="middle" dominant-baseline="central">"Axis" / GeometricCurveSet</text>
  </g>

  <!-- arrow: IfcProductDefinitionShape → "Body" representation -->
  <path d="M550 240 L610 240 L610 128 L648 128" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="lbl" x="602" y="188" text-anchor="end">Representations[0]</text>

  <!-- arrow: IfcProductDefinitionShape → "Axis" representation -->
  <path d="M550 256 L610 256 L610 381 L648 381" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="lbl" x="602" y="322" text-anchor="end">Representations[1]</text>

  <!-- ── IfcSectionedSolidHorizontal ── -->
  <g class="c-teal">
    <rect x="980" y="104" width="240" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="1100" y="128" text-anchor="middle" dominant-baseline="central">IfcSectionedSolidHorizontal</text>
  </g>

  <!-- arrow: "Body" representation → IfcSectionedSolidHorizontal -->
  <line x1="890" y1="128" x2="978" y2="128" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="934" y="118" text-anchor="middle">Items</text>

  <!-- ── IfcOffsetCurveByDistances × 6 (top surface + soffit) ── -->
  <g class="c-teal">
    <rect x="980" y="246" width="240" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="1100" y="261" text-anchor="middle" dominant-baseline="central">IfcOffsetCurveByDistances</text>
    <text class="ts" x="1100" y="277" text-anchor="middle" dominant-baseline="central">Tag = "A_top"</text>
  </g>
  <g class="c-teal">
    <rect x="980" y="292" width="240" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="1100" y="307" text-anchor="middle" dominant-baseline="central">IfcOffsetCurveByDistances</text>
    <text class="ts" x="1100" y="323" text-anchor="middle" dominant-baseline="central">Tag = "B_top"</text>
  </g>
  <g class="c-teal">
    <rect x="980" y="338" width="240" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="1100" y="353" text-anchor="middle" dominant-baseline="central">IfcOffsetCurveByDistances</text>
    <text class="ts" x="1100" y="369" text-anchor="middle" dominant-baseline="central">Tag = "C_top"</text>
  </g>
  <g class="c-teal">
    <rect x="980" y="384" width="240" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="1100" y="399" text-anchor="middle" dominant-baseline="central">IfcOffsetCurveByDistances</text>
    <text class="ts" x="1100" y="415" text-anchor="middle" dominant-baseline="central">Tag = "A_bot"</text>
  </g>
  <g class="c-teal">
    <rect x="980" y="430" width="240" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="1100" y="445" text-anchor="middle" dominant-baseline="central">IfcOffsetCurveByDistances</text>
    <text class="ts" x="1100" y="461" text-anchor="middle" dominant-baseline="central">Tag = "B_bot"</text>
  </g>
  <g class="c-teal">
    <rect x="980" y="476" width="240" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="1100" y="491" text-anchor="middle" dominant-baseline="central">IfcOffsetCurveByDistances</text>
    <text class="ts" x="1100" y="507" text-anchor="middle" dominant-baseline="central">Tag = "C_bot"</text>
  </g>

  <!-- spine + branches: "Axis" representation → six offset curves -->
  <path d="M890 381 L940 381" fill="none" stroke="#185FA5" stroke-width="1"/>
  <path d="M940 266 L940 496" fill="none" stroke="#185FA5" stroke-width="1"/>
  <path d="M940 266 L978 266" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M940 312 L978 312" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M940 358 L978 358" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M940 404 L978 404" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M940 450 L978 450" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M940 496 L978 496" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="lbl" x="932" y="256" text-anchor="end">Items (ordered list of 6)</text>

  <!-- ── Footer note ── -->
  <text class="lbl" x="650" y="562" text-anchor="middle" fill="#aaa">No placeholder host entity: guide curves inherit rootedness through IfcPavement's own IfcProductDefinitionShape.</text>
</svg>
