<svg width="930" viewBox="0 0 930 630" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Entity relationship diagram: Product Span Positioning linking one IfcProduct to start and end IfcReferent instances</title>
  <desc>An IfcRailing (guardrail run) is positioned by two separate IfcRelPositions relationships. The left relationship has RelatingPositioningElement pointing to a start IfcReferent (PredefinedType = POSITION) at DistanceAlong 14000.0 with Pset_Stationing Station = 24000.00. The right relationship has RelatingPositioningElement pointing to an end IfcReferent (PredefinedType = POSITION) at DistanceAlong 15000.0 with Pset_Stationing Station = 25000.00. Both relationships have the IfcRailing as RelatedProducts. This is the Product Span Positioning concept template pattern. A third IfcRelPositions relates both the start and end IfcReferent instances (RelatedProducts) to a shared IfcAlignment (RelatingPositioningElement), tying the span positioning back to the alignment both referents are stationed against.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 500; }
      .ts  { font-size: 12px; font-weight: 400; fill: #555; }
      .lbl { font-size: 11px; font-weight: 400; fill: #777; }

      /* Spatial element — purple */
      .c-purple rect  { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th   { fill: #3C3489; }
      .c-purple .ts   { fill: #534AB7; }

      /* Semantic / referent — teal */
      .c-teal rect    { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th     { fill: #085041; }
      .c-teal .ts     { fill: #0F6E56; }

      /* Relationship — gray */
      .c-gray rect    { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th     { fill: #2C2C2A; }
      .c-gray .ts     { fill: #5F5E5A; }
    </style>
  </defs>

  <!-- ── Legend (top left) ── -->
  <rect x="20" y="20" width="210" height="88" rx="6" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <text class="ts" x="125" y="38" text-anchor="middle" fill="#555">Legend</text>
  <rect x="32" y="48" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="lbl" x="50" y="59">Spatial element</text>
  <rect x="32" y="68" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="lbl" x="50" y="79">Relationship</text>
  <rect x="32" y="88" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="lbl" x="50" y="99">Referent / property set</text>

  <!-- ── IfcRailing ── -->
  <g class="c-purple">
    <rect x="340" y="20" width="220" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="450" y="42" text-anchor="middle" dominant-baseline="central">IfcRailing</text>
    <text class="ts" x="450" y="64" text-anchor="middle" dominant-baseline="central">guardrail run</text>
  </g>

  <!-- arrows: IfcRailing → two IfcRelPositions -->
  <path d="M400 76 L170 118" fill="none" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M500 76 L730 118" fill="none" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="lbl" x="280" y="100">RelatedProducts</text>
  <text class="lbl" x="700" y="100" text-anchor="middle">RelatedProducts</text>

  <!-- ── IfcRelPositions (start) ── -->
  <g class="c-gray">
    <rect x="60" y="120" width="220" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="170" y="144" text-anchor="middle" dominant-baseline="central">IfcRelPositions</text>
  </g>

  <!-- ── IfcRelPositions (end) ── -->
  <g class="c-gray">
    <rect x="620" y="120" width="220" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="730" y="144" text-anchor="middle" dominant-baseline="central">IfcRelPositions</text>
  </g>

  <!-- arrows: IfcRelPositions → IfcReferent -->
  <line x1="170" y1="168" x2="170" y2="228" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="178" y="200">RelatingPositioningElement</text>
  <line x1="730" y1="168" x2="730" y2="228" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="738" y="200">RelatingPositioningElement</text>

  <!-- ── IfcReferent (start) ── -->
  <g class="c-teal">
    <rect x="60" y="230" width="220" height="74" rx="8" stroke-width="0.5"/>
    <text class="th" x="170" y="250" text-anchor="middle" dominant-baseline="central">IfcReferent — Start</text>
    <text class="ts" x="170" y="268" text-anchor="middle" dominant-baseline="central">DistanceAlong = 14000.0</text>
    <text class="ts" x="170" y="286" text-anchor="middle" dominant-baseline="central">PredefinedType = POSITION</text>
  </g>

  <!-- ── IfcReferent (end) ── -->
  <g class="c-teal">
    <rect x="620" y="230" width="220" height="74" rx="8" stroke-width="0.5"/>
    <text class="th" x="730" y="250" text-anchor="middle" dominant-baseline="central">IfcReferent — End</text>
    <text class="ts" x="730" y="268" text-anchor="middle" dominant-baseline="central">DistanceAlong = 15000.0</text>
    <text class="ts" x="730" y="286" text-anchor="middle" dominant-baseline="central">PredefinedType = POSITION</text>
  </g>

  <!-- arrows: IfcReferent → Pset_Stationing -->
  <line x1="170" y1="304" x2="170" y2="356" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="178" y="332">HasProperties</text>
  <line x1="730" y1="304" x2="730" y2="356" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="738" y="332">HasProperties</text>

  <!-- ── Pset_Stationing (start) ── -->
  <g class="c-teal">
    <rect x="60" y="358" width="220" height="50" rx="8" stroke-width="0.5" stroke-dasharray="4 3"/>
    <text class="th" x="170" y="376" text-anchor="middle" dominant-baseline="central">Pset_Stationing</text>
    <text class="ts" x="170" y="394" text-anchor="middle" dominant-baseline="central">Station = 24000.00</text>
  </g>

  <!-- ── Pset_Stationing (end) ── -->
  <g class="c-teal">
    <rect x="620" y="358" width="220" height="50" rx="8" stroke-width="0.5" stroke-dasharray="4 3"/>
    <text class="th" x="730" y="376" text-anchor="middle" dominant-baseline="central">Pset_Stationing</text>
    <text class="ts" x="730" y="394" text-anchor="middle" dominant-baseline="central">Station = 25000.00</text>
  </g>

  <!-- arrows: IfcReferent (start/end) → alignment-link IfcRelPositions -->
  <path d="M60 267 L24 267 L24 452 L338 452" fill="none" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="lbl" x="181" y="444" text-anchor="middle">RelatedProducts</text>
  <path d="M840 267 L906 267 L906 452 L562 452" fill="none" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="lbl" x="734" y="444" text-anchor="middle">RelatedProducts</text>

  <!-- ── IfcRelPositions (alignment link) ── -->
  <g class="c-gray">
    <rect x="340" y="430" width="220" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="450" y="452" text-anchor="middle" dominant-baseline="central">IfcRelPositions</text>
  </g>

  <!-- arrow: alignment-link IfcRelPositions → IfcAlignment -->
  <line x1="450" y1="474" x2="450" y2="506" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
  <text class="lbl" x="458" y="490">RelatingPositioningElement</text>

  <!-- ── IfcAlignment ── -->
  <g class="c-purple">
    <rect x="340" y="508" width="220" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="450" y="530" text-anchor="middle" dominant-baseline="central">IfcAlignment</text>
    <text class="ts" x="450" y="552" text-anchor="middle" dominant-baseline="central">horizontal / vertical layout</text>
  </g>

  <!-- ── Annotation ── -->
  <text class="lbl" x="450" y="588" text-anchor="middle" fill="#aaa">Two IfcRelPositions instances link one IfcProduct to its start and end referents (Concept Template 4.1.5.9).</text>
  <text class="lbl" x="450" y="606" text-anchor="middle" fill="#aaa">A third IfcRelPositions relates both referents (RelatedProducts) to the alignment they are stationed against (RelatingPositioningElement).</text>
</svg>
