<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="780" height="700" viewBox="0 0 780 700"
     font-family="Georgia, 'Times New Roman', serif">

  <!--
    IfcLine / IfcCurveSegment — Revised Parameters
    ─────────────────────────────────────────────────────────────
    Direction:    135° from +X  →  unit vec (−0.70711, +0.70711)
    P (line passes through): (1000, −800)   SVG: (558.0, 583.5)
    Offset:       100  →  S = P + 100·dir = (929.289, −729.289)  SVG: (536.1, 561.6)
    Length:       1956.786  →  E = S + L·dir = (−454.367, 654.367)  SVG: (106.6, 132.1)

    Coordinate mapping:
      svgX = 247.6 + worldX · 0.3104
      svgY = 335.2 − worldY · 0.3104
    ─────────────────────────────────────────────────────────────
  -->

  <defs>
    <!-- Axis arrow (gray) -->
    <marker id="axArrow" viewBox="0 0 10 8" refX="9" refY="4"
            markerWidth="7" markerHeight="7" orient="auto">
      <polygon points="0,0 10,4 0,8 2.5,4" fill="#888"/>
    </marker>
    <!-- Red dimension arrowheads -->
    <marker id="dFwd" viewBox="0 0 10 8" refX="9" refY="4"
            markerWidth="6" markerHeight="6" orient="auto">
      <polygon points="0,0 10,4 0,8 2.5,4" fill="#0055CC"/>
    </marker>
    <marker id="dRev" viewBox="0 0 10 8" refX="1" refY="4"
            markerWidth="6" markerHeight="6" orient="auto">
      <polygon points="10,0 0,4 10,8 7.5,4" fill="#0055CC"/>
    </marker>
    <!-- Blue direction arrow for segment travel indicator -->
    <marker id="segDir" viewBox="0 0 12 8" refX="10" refY="4"
            markerWidth="9" markerHeight="9" orient="auto">
      <polygon points="0,0 12,4 0,8 3,4" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Cream background -->
  <rect width="1100" height="700" fill="#f8f7f4" rx="4"/>

  <!-- ═══════════════════════════════════════════════════════════
       GRID
       Vertical: every 200 world units, X = −600 … 1200
         wx=−600: svgX= 61    wx=−400: svgX=123    wx=−200: svgX=186
         wx=   0: svgX=248    wx= 200: svgX=310    wx= 400: svgX=372
         wx= 600: svgX=434    wx= 800: svgX=496    wx=1000: svgX=558
         wx=1200: svgX=620
       Horizontal: every 200 world units, Y = −1000 … 800
         wy=−1000: svgY=646   wy=−800: svgY=584   wy=−600: svgY=521
         wy=−400:  svgY=459   wy=−200: svgY=397   wy=   0: svgY=335
         wy= 200:  svgY=273   wy= 400: svgY=211   wy= 600: svgY=149
         wy= 800:  svgY= 87
  ═══════════════════════════════════════════════════════════ -->
  <g stroke="#d8d4c8" stroke-width="0.5" fill="none">
    <line x1=" 61" y1="50" x2=" 61" y2="660"/>
    <line x1="123" y1="50" x2="123" y2="660"/>
    <line x1="186" y1="50" x2="186" y2="660"/>
    <line x1="248" y1="50" x2="248" y2="660"/>
    <line x1="310" y1="50" x2="310" y2="660"/>
    <line x1="372" y1="50" x2="372" y2="660"/>
    <line x1="434" y1="50" x2="434" y2="660"/>
    <line x1="496" y1="50" x2="496" y2="660"/>
    <line x1="558" y1="50" x2="558" y2="660"/>
    <line x1="620" y1="50" x2="620" y2="660"/>
    <line x1="682" y1="50" x2="682" y2="660"/>

    <line x1="50" y1="646" x2="700" y2="646"/>
    <line x1="50" y1="584" x2="700" y2="584"/>
    <line x1="50" y1="521" x2="700" y2="521"/>
    <line x1="50" y1="459" x2="700" y2="459"/>
    <line x1="50" y1="397" x2="700" y2="397"/>
    <line x1="50" y1="335" x2="700" y2="335"/>
    <line x1="50" y1="273" x2="700" y2="273"/>
    <line x1="50" y1="211" x2="700" y2="211"/>
    <line x1="50" y1="149" x2="700" y2="149"/>
    <line x1="50" y1=" 87" x2="700" y2=" 87"/>
  </g>

  <!-- Grid numeric labels -->
  <g font-size="10" fill="#888" text-anchor="middle">
    <text x=" 61" y="351">-600</text>
    <text x="123" y="351">-400</text>
    <text x="186" y="351">-200</text>
    <text x="310" y="351">200</text>
    <text x="372" y="351">400</text>
    <text x="434" y="351">600</text>
    <text x="496" y="351">800</text>
    <text x="558" y="351">1000</text>
    <text x="620" y="351">1200</text>
  </g>
  <g font-size="10" fill="#888" text-anchor="end">
    <text x="242" y="650">-1000</text>
    <text x="242" y="588">-800</text>
    <text x="242" y="525">-600</text>
    <text x="242" y="463">-400</text>
    <text x="242" y="401">-200</text>
    <text x="242" y="278">200</text>
    <text x="242" y="215">400</text>
    <text x="242" y="153">600</text>
    <text x="242" y=" 91">800</text>
  </g>
  <text x="242" y="339" font-size="10" fill="#888" text-anchor="end">0</text>

  <!-- ═══════════════════════════════════════════════════════════
       AXES
       X axis at wy=0: svgY=335   Y axis at wx=0: svgX=248
  ═══════════════════════════════════════════════════════════ -->
  <line x1="50"  y1="335" x2="700" y2="335"
        stroke="#888" stroke-width="1" marker-end="url(#axArrow)"/>
  <line x1="248" y1="660" x2="248" y2="44"
        stroke="#888" stroke-width="1" marker-end="url(#axArrow)"/>
  <text x="703" y="339" font-size="16" font-style="italic" fill="#888" dominant-baseline="middle">X</text>
  <text x="252" y="38"  font-size="16" font-style="italic" fill="#888">Y</text>

  <!-- Axis tick marks -->
  <g stroke="#888" stroke-width="1">
    <line x1=" 61" y1="330" x2=" 61" y2="340"/>
    <line x1="123" y1="330" x2="123" y2="340"/>
    <line x1="186" y1="330" x2="186" y2="340"/>
    <line x1="310" y1="330" x2="310" y2="340"/>
    <line x1="372" y1="330" x2="372" y2="340"/>
    <line x1="434" y1="330" x2="434" y2="340"/>
    <line x1="496" y1="330" x2="496" y2="340"/>
    <line x1="558" y1="330" x2="558" y2="340"/>
    <line x1="620" y1="330" x2="620" y2="340"/>
    <line x1="243" y1="646" x2="253" y2="646"/>
    <line x1="243" y1="584" x2="253" y2="584"/>
    <line x1="243" y1="521" x2="253" y2="521"/>
    <line x1="243" y1="459" x2="253" y2="459"/>
    <line x1="243" y1="397" x2="253" y2="397"/>
    <line x1="243" y1="273" x2="253" y2="273"/>
    <line x1="243" y1="211" x2="253" y2="211"/>
    <line x1="243" y1="149" x2="253" y2="149"/>
    <line x1="243" y1=" 87" x2="253" y2=" 87"/>
  </g>
  <circle cx="248" cy="335" r="2.5" fill="#888"/>

  <!-- ═══════════════════════════════════════════════════════════
       IfcLine PARENT CURVE — infinite, gray dashed
       Passes through P(1000,−800), direction 135°
       Displayed from top edge (24.5, 50) to bottom edge (634.5, 660)
  ═══════════════════════════════════════════════════════════ -->
  <line x1="24.5" y1="50" x2="634.5" y2="660"
        stroke="#888888" stroke-width="1.5" stroke-dasharray="10,6"/>

  <!-- ═══════════════════════════════════════════════════════════
       IfcCurveSegment — solid blue
       E_svg = (106.6, 132.1)   S_svg = (536.1, 561.6)
  ═══════════════════════════════════════════════════════════ -->
  <line x1="106.6" y1="132.1" x2="536.1" y2="561.6"
        stroke="#c0392b" stroke-width="3.5"/>

  <!-- Segment endpoint markers -->
  <circle cx="106.6" cy="132.1" r="5.5" fill="#c0392b"/>
  <circle cx="536.1" cy="561.6" r="5.5" fill="#c0392b"/>

  <!-- Travel direction arrow at ~38% from E toward S
       38% point: (106.6 + 0.38·429.5, 132.1 + 0.38·429.5) = (269.6, 295.1)
       34% point: (106.6 + 0.34·429.5, 132.1 + 0.34·429.5) = (252.8, 278.3)
  -->
  <line x1="269.6" y1="295.1" x2="252.8" y2="278.3"
        stroke="#c0392b" stroke-width="2" marker-end="url(#segDir)"/>

  <!-- ═══════════════════════════════════════════════════════════
       Point P (1000, −800) — red dot
       P_svg = (558.0, 583.5)
  ═══════════════════════════════════════════════════════════ -->
  <circle cx="558.0" cy="583.5" r="5.5" fill="#0055CC"/>

  <!-- ═══════════════════════════════════════════════════════════
       LENGTH DIMENSION: L = 1956.786
       Perpendicular leaders in CW direction (upper-right of segment)
       perp = (0.7071, −0.7071),  offset = 52 px
       E_dim = (143.4,  95.3)
       S_dim = (572.9, 524.8)
       Mid   = (358.1, 310.0)
  ═══════════════════════════════════════════════════════════ -->
  <line x1="106.6" y1="132.1" x2="143.4" y2=" 95.3" stroke="#0055CC" stroke-width="0.8"/>
  <line x1="536.1" y1="561.6" x2="572.9" y2="524.8" stroke="#0055CC" stroke-width="0.8"/>
  <line x1="143.4" y1=" 95.3" x2="572.9" y2="524.8"
        stroke="#0055CC" stroke-width="1.2"
        marker-start="url(#dRev)" marker-end="url(#dFwd)"/>
  <!-- Label perpendicular-offset from mid of dim line, shifted upper-right -->
  <text x="390" y="282" font-size="13" fill="#0055CC" text-anchor="middle"
        font-style="italic">L = 1956.786</text>

  <!-- ═══════════════════════════════════════════════════════════
       OFFSET DIMENSION: offset = 100  (P → S)
       Perpendicular leaders in CW direction (upper-right of P-S segment)
       perp = (0.7071, −0.7071),  offset = 52 px  (matches long dim line)
       P_od = (594.8, 546.7)
       S_od = (572.9, 524.8)   ← shared with long dim line S endpoint
       Mid  = (583.8, 535.8)
  ═══════════════════════════════════════════════════════════ -->
  <line x1="558.0" y1="583.5" x2="594.8" y2="546.7" stroke="#0055CC" stroke-width="0.8"/>
  <line x1="536.1" y1="561.6" x2="572.9" y2="524.8" stroke="#0055CC" stroke-width="0.8"/>
  <line x1="594.8" y1="546.7" x2="572.9" y2="524.8"
        stroke="#0055CC" stroke-width="1.2"
        marker-start="url(#dRev)" marker-end="url(#dFwd)"/>
  <text x="605" y="533" font-size="12" fill="#0055CC" text-anchor="start">offset = 100</text>


  <!-- ═══════════════════════════════════════════════════════════
       POINT LABELS
  ═══════════════════════════════════════════════════════════ -->

  <!-- P label — at the -800 grid line -->
  <text x="565" y="584" font-size="12" fill="#0055CC" dominant-baseline="middle">
    <tspan font-style="italic">P</tspan>(1000, −800)
  </text>

  <!-- S label — to the left of S (segment start), with small leader -->
  <line x1="530" y1="557" x2="506" y2="542" stroke="#c0392b" stroke-width="0.7"/>
  <text x="504" y="540" font-size="11" fill="#c0392b" text-anchor="end" dominant-baseline="middle">
    <tspan font-style="italic">S</tspan> (start)
  </text>
  <text x="504" y="554" font-size="10" fill="#c0392b" text-anchor="end">(929.289, −729.289)</text>

  <!-- E label — above and right of E endpoint -->
  <text x="115" y="121" font-size="11" fill="#c0392b" dominant-baseline="auto">
    <tspan font-style="italic" font-weight="bold">E</tspan> (end)
  </text>
  <text x="115" y="135" font-size="10" fill="#c0392b">(−454.367, 654.367)</text>

  <!-- IfcLine label — on the gray dashed line, mid-right portion -->
  <text x="610" y="618" font-size="12" fill="#666666" font-style="italic" text-anchor="start">IfcLine</text>
  <text x="610" y="632" font-size="10" fill="#888888" text-anchor="start">(parent curve — infinite)</text>

  <!-- IfcCurveSegment label — lower left quadrant -->
  <!-- Segment at y=222: x = 106.6 + (222-132.1)/429.5 * 429.5 = 196.5 -->
  <text x="62" y="430" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="start">IfcCurveSegment</text>
  <text x="62" y="448" font-size="11" fill="#c0392b" text-anchor="start">L = 1956.786  ·  direction = 135°</text>
  <text x="62" y="464" font-size="11" fill="#c0392b" text-anchor="start">offset from P = 100</text>
  <!-- Leader from label to upper-left portion of segment -->
  <line x1="170" y1="422" x2="196" y2="230" stroke="#c0392b" stroke-width="0.7" stroke-dasharray="3,2"/>

  <!-- ═══════════════════════════════════════════════════════════
       LEGEND
  ═══════════════════════════════════════════════════════════ -->
  <rect x="330" y="68" width="360" height="76" rx="5"
        fill="#f8f7f4" stroke="#ccc" stroke-width="0.8"/>
  <text x="343" y="88" font-size="12" font-weight="bold" fill="#333">Legend</text>

  <line x1="343" y1="106" x2="397" y2="106"
        stroke="#888888" stroke-width="1.5" stroke-dasharray="10,5"/>
  <text x="405" y="110" font-size="11" fill="#555555">IfcLine (infinite parent curve)</text>

  <line x1="343" y1="128" x2="397" y2="128" stroke="#c0392b" stroke-width="3.5"/>
  <circle cx="343" cy="128" r="4" fill="#c0392b"/>
  <circle cx="397" cy="128" r="4" fill="#c0392b"/>
  <text x="405" y="132" font-size="11" fill="#555555">IfcCurveSegment (trimmed from IfcLine)</text>


</svg>
