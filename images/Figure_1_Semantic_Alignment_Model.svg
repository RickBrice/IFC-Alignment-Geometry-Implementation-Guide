<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="inh" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="white" stroke="#444" stroke-width="1.3"/>
    </marker>
  </defs>

  <rect width="880" height="560" fill="white"/>

  <!-- ROW 1: IfcAlignment -->
  <rect x="310" y="24" width="260" height="38" rx="4" fill="#dce8ff" stroke="#2050a0" stroke-width="1.5"/>
  <text x="440" y="48" text-anchor="middle" font-size="12" font-weight="bold" fill="#102040">IfcAlignment</text>

  <!-- Stem and branch to row 2 -->
  <line x1="440" y1="62" x2="440" y2="100" stroke="#555" stroke-width="1.2"/>
  <line x1="150" y1="100" x2="730" y2="100" stroke="#555" stroke-width="1.2"/>
  <line x1="150" y1="100" x2="150" y2="140" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="440" y1="100" x2="440" y2="140" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="730" y1="100" x2="730" y2="140" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="448" y="94" font-size="10" fill="#666" font-style="italic">IfcRelNests</text>

  <!-- ROW 2: Alignment layout types -->
  <rect x="40" y="140" width="220" height="38" rx="4" fill="#f0f4fa" stroke="#2050a0" stroke-width="1.5"/>
  <text x="150" y="164" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">IfcAlignmentHorizontal</text>

  <rect x="330" y="140" width="220" height="38" rx="4" fill="#f0f4fa" stroke="#2050a0" stroke-width="1.5"/>
  <text x="440" y="164" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">IfcAlignmentVertical</text>

  <rect x="620" y="140" width="220" height="38" rx="4" fill="#f2eeff" stroke="#2050a0" stroke-width="1.8"/>
  <text x="730" y="164" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">IfcAlignmentCant</text>

  <!-- Connections row 2 → row 3 -->
  <line x1="150" y1="178" x2="150" y2="258" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="440" y1="178" x2="440" y2="258" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="730" y1="178" x2="730" y2="258" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="158" y="224" font-size="10" fill="#666" font-style="italic">IfcRelNests</text>

  <!-- ROW 3: IfcAlignmentSegment -->
  <rect x="40" y="258" width="220" height="38" rx="4" fill="#f0f4fa" stroke="#2050a0" stroke-width="1.5"/>
  <text x="150" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">IfcAlignmentSegment</text>

  <rect x="330" y="258" width="220" height="38" rx="4" fill="#f0f4fa" stroke="#2050a0" stroke-width="1.5"/>
  <text x="440" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">IfcAlignmentSegment</text>

  <rect x="620" y="258" width="220" height="38" rx="4" fill="#f2eeff" stroke="#2050a0" stroke-width="1.8"/>
  <text x="730" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">IfcAlignmentSegment</text>

  <!-- Connections row 3 → row 4 -->
  <line x1="150" y1="296" x2="150" y2="376" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="440" y1="296" x2="440" y2="376" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="730" y1="296" x2="730" y2="376" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="158" y="342" font-size="10" fill="#666" font-style="italic">DesignParameters</text>

  <!-- ROW 4: Parameter segment subtypes -->
  <rect x="10" y="376" width="278" height="38" rx="4" fill="#f0f4fa" stroke="#2050a0" stroke-width="1.5"/>
  <text x="149" y="400" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#111">IfcAlignmentHorizontalSegment</text>

  <rect x="305" y="376" width="270" height="38" rx="4" fill="#f0f4fa" stroke="#2050a0" stroke-width="1.5"/>
  <text x="440" y="400" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#111">IfcAlignmentVerticalSegment</text>

  <rect x="592" y="376" width="275" height="38" rx="4" fill="#f2eeff" stroke="#2050a0" stroke-width="1.8"/>
  <text x="730" y="400" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#111">IfcAlignmentCantSegment</text>

  <!-- Inheritance: subtypes converge to abstract supertype -->
  <line x1="149" y1="414" x2="149" y2="452" stroke="#555" stroke-width="1.2"/>
  <line x1="440" y1="414" x2="440" y2="452" stroke="#555" stroke-width="1.2"/>
  <line x1="730" y1="414" x2="730" y2="452" stroke="#555" stroke-width="1.2"/>
  <line x1="149" y1="452" x2="730" y2="452" stroke="#555" stroke-width="1.2"/>
  <line x1="440" y1="452" x2="440" y2="490" stroke="#555" stroke-width="1.2" marker-end="url(#inh)"/>
  <text x="448" y="477" font-size="10" fill="#666" font-style="italic">subtype of</text>

  <!-- ROW 5: IfcAlignmentParameterSegment (abstract) -->
  <rect x="290" y="490" width="300" height="50" rx="4" fill="#f0f8f0" stroke="#2050a0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="440" y="513" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">IfcAlignmentParameterSegment</text>
  <text x="440" y="529" text-anchor="middle" font-size="9.5" fill="#555" font-style="italic">{abstract}</text>

</svg>
