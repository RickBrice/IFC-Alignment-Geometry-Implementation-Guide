<svg width="680" height="500" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Linear placement coordinate frame with OffsetLateral and OffsetVertical</title>
  <desc>Perspective view of a graded alignment curve in 3D. At a selected point on the curve, three orthogonal axes X, Y, Z are shown. A dashed line indicates OffsetLateral (transverse/lateral direction) and a dashed vertical arrow shows OffsetVertical.</desc>

  <defs>
    <style>
      text { font-family: sans-serif; fill: #3d3d3a; }
      .th  { font-size: 14px; font-weight: 500; }
      .ts  { font-size: 12px; font-weight: 400; }
      @media (prefers-color-scheme: dark) {
        text { fill: #c2c0b6; }
      }
    </style>
    <marker id="arr-x" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-y" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-z" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-lat" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-vert" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Ground grid -->
  <g opacity="0.13" stroke="#73726c" stroke-width="0.6" fill="none">
    <line x1="60"  y1="390" x2="340" y2="260"/>
    <line x1="120" y1="410" x2="400" y2="280"/>
    <line x1="180" y1="430" x2="460" y2="300"/>
    <line x1="240" y1="450" x2="520" y2="320"/>
    <line x1="300" y1="470" x2="580" y2="340"/>
    <line x1="60"  y1="390" x2="300" y2="470"/>
    <line x1="160" y1="353" x2="400" y2="433"/>
    <line x1="260" y1="316" x2="500" y2="396"/>
    <line x1="340" y1="260" x2="580" y2="340"/>
  </g>

  <!-- Alignment curve ribbon -->
  <path d="M 80 370 C 130 355, 170 305, 240 288 S 360 242, 440 218 S 540 200, 600 185
           L 598 175 C 538 190, 438 208, 360 232 S 238 278, 168 295 S 128 345, 78 360 Z"
        fill="#73726c" opacity="0.06"/>
  <path d="M 80 370 C 130 355, 170 305, 240 288 S 360 242, 440 218 S 540 200, 600 185"
        fill="none" stroke="#73726c" stroke-width="2.5" opacity="0.5"/>

  <!-- Origin point P -->
  <circle cx="310" cy="263" r="9" fill="none" stroke="#888780" stroke-width="1" opacity="0.4"/>
  <circle cx="310" cy="263" r="5" fill="#888780" opacity="0.9"/>

  <!-- Z axis (vertical) -->
  <line x1="310" y1="263" x2="310" y2="110"
        stroke="#378ADD" stroke-width="2.2" marker-end="url(#arr-z)" stroke-linecap="round"/>
  <text class="th" x="316" y="105" fill="#378ADD">Z</text>

  <!-- X axis (tangent) -->
  <line x1="310" y1="263" x2="430" y2="228"
        stroke="#D85A30" stroke-width="2.2" marker-end="url(#arr-x)" stroke-linecap="round"/>
  <text class="th" x="436" y="226" fill="#D85A30">X</text>
  <text class="ts" x="436" y="240" fill="#D85A30" opacity="0.75">(tangent)</text>

  <!-- Y axis (lateral) -->
  <line x1="310" y1="263" x2="410" y2="308"
        stroke="#1D9E75" stroke-width="2.2" marker-end="url(#arr-y)" stroke-linecap="round"/>
  <text class="th" x="416" y="316" fill="#1D9E75">Y</text>
  <text class="ts" x="416" y="330" fill="#1D9E75" opacity="0.75">(lateral)</text>

  <!-- OffsetLateral (dashed, purple) -->
  <line x1="310" y1="263" x2="375" y2="293"
        stroke="#534AB7" stroke-width="1.8" stroke-dasharray="6 4"
        marker-end="url(#arr-lat)" stroke-linecap="round"/>
  <circle cx="375" cy="293" r="4" fill="#534AB7" opacity="0.85"/>
  <text class="ts" x="380" y="312" fill="#534AB7" font-style="italic">OffsetLateral</text>

  <!-- OffsetVertical (dashed, amber) -->
  <line x1="375" y1="293" x2="375" y2="208"
        stroke="#BA7517" stroke-width="1.8" stroke-dasharray="5 4"
        marker-end="url(#arr-vert)" stroke-linecap="round"/>
  <circle cx="375" cy="208" r="4" fill="#BA7517" opacity="0.85"/>
  <text class="ts" x="384" y="215" fill="#BA7517" font-style="italic">OffsetVertical</text>

  <!-- Right-angle tick -->
  <path d="M 369 293 L 369 299 L 375 299" fill="none" stroke="#888780" stroke-width="0.8" opacity="0.5"/>

  <!-- Point labels -->
  <text class="ts" x="290" y="282" fill="#73726c" text-anchor="end">P (on alignment)</text>
  <text class="ts" x="384" y="200" fill="#73726c">P&#x2033; (placed point)</text>

  <!-- Station direction -->
  <text class="ts" x="612" y="183" fill="#73726c">s &#x2192;</text>

  <!-- Grade reference line -->
  <line x1="130" y1="347" x2="570" y2="203"
        stroke="#73726c" stroke-width="0.6" stroke-dasharray="3 5" opacity="0.25"/>
  <text class="ts" x="90" y="360" fill="#73726c" opacity="0.6" font-style="italic">grade</text>

  <!-- Legend box -->
  <rect x="36" y="60" width="198" height="160" rx="8"
        fill="#f1efe8" opacity="0.92" stroke="#b4b2a9" stroke-width="0.5"/>
  <text class="th" x="52" y="84" fill="#3d3d3a">Legend</text>
  <line x1="52" y1="104" x2="84" y2="104" stroke="#D85A30" stroke-width="2" marker-end="url(#arr-x)"/>
  <text class="ts" x="92" y="108" fill="#3d3d3a">X &#x2014; tangent (along alignment)</text>
  <line x1="52" y1="126" x2="84" y2="126" stroke="#1D9E75" stroke-width="2" marker-end="url(#arr-y)"/>
  <text class="ts" x="92" y="130" fill="#3d3d3a">Y &#x2014; lateral (transverse)</text>
  <line x1="52" y1="148" x2="84" y2="148" stroke="#378ADD" stroke-width="2" marker-end="url(#arr-z)"/>
  <text class="ts" x="92" y="152" fill="#3d3d3a">Z &#x2014; vertical (up)</text>
  <line x1="52" y1="170" x2="84" y2="170" stroke="#534AB7" stroke-width="1.8"
        stroke-dasharray="5 3" marker-end="url(#arr-lat)"/>
  <text class="ts" x="92" y="174" fill="#3d3d3a" font-style="italic">OffsetLateral</text>
  <line x1="52" y1="192" x2="84" y2="192" stroke="#BA7517" stroke-width="1.8"
        stroke-dasharray="5 3" marker-end="url(#arr-vert)"/>
  <text class="ts" x="92" y="196" fill="#3d3d3a" font-style="italic">OffsetVertical</text>
</svg>
