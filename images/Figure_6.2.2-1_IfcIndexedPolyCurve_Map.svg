<svg xmlns="http://www.w3.org/2000/svg" width="560" height="400" viewBox="0 0 560 400">

  <rect width="560" height="400" fill="#fafafa"/>

  <!-- Map grid background -->
  <g stroke="#e2e6ea" stroke-width="0.7">
    <line x1="0"   y1="50"  x2="560" y2="50"/>
    <line x1="0"   y1="100" x2="560" y2="100"/>
    <line x1="0"   y1="150" x2="560" y2="150"/>
    <line x1="0"   y1="200" x2="560" y2="200"/>
    <line x1="0"   y1="250" x2="560" y2="250"/>
    <line x1="0"   y1="300" x2="560" y2="300"/>
    <line x1="0"   y1="350" x2="560" y2="350"/>
    <line x1="50"  y1="0"   x2="50"  y2="400"/>
    <line x1="100" y1="0"   x2="100" y2="400"/>
    <line x1="150" y1="0"   x2="150" y2="400"/>
    <line x1="200" y1="0"   x2="200" y2="400"/>
    <line x1="250" y1="0"   x2="250" y2="400"/>
    <line x1="300" y1="0"   x2="300" y2="400"/>
    <line x1="350" y1="0"   x2="350" y2="400"/>
    <line x1="400" y1="0"   x2="400" y2="400"/>
    <line x1="450" y1="0"   x2="450" y2="400"/>
    <line x1="500" y1="0"   x2="500" y2="400"/>
  </g>

  <!-- IfcLineIndex segments — blue -->
  <g stroke="#1565C0" stroke-width="2.5" stroke-linecap="round">
    <!-- index 0 → 1 -->
    <line x1="50"  y1="350" x2="180" y2="280"/>
    <!-- index 3 → 4 -->
    <line x1="300" y1="210" x2="380" y2="210"/>
    <!-- index 6 → 7 -->
    <line x1="460" y1="140" x2="510" y2="100"/>
  </g>

  <!-- IfcArcIndex segments — orange, quadratic bezier passing through arc midpoint -->
  <!-- Arc 1: indices [1, 2, 3]  ctrl = 2*(245,240) - 0.5*((180,280)+(300,210)) = (250,235) -->
  <path d="M 180,280 Q 250,235 300,210" stroke="#E65100" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Arc 2: indices [4, 5, 6]  ctrl = 2*(425,168) - 0.5*((380,210)+(460,140)) = (430,161) -->
  <path d="M 380,210 Q 430,161 460,140" stroke="#E65100" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Vertex markers — segment endpoint vertices (solid dark circles) -->
  <g fill="#222" stroke="white" stroke-width="1.5">
    <circle cx="50"  cy="350" r="5"/>
    <circle cx="180" cy="280" r="5"/>
    <circle cx="300" cy="210" r="5"/>
    <circle cx="380" cy="210" r="5"/>
    <circle cx="460" cy="140" r="5"/>
    <circle cx="510" cy="100" r="5"/>
  </g>

  <!-- Arc midpoint markers — hollow orange circles (index 2 and 5) -->
  <g fill="white" stroke="#E65100" stroke-width="2">
    <circle cx="245" cy="240" r="5"/>
    <circle cx="425" cy="168" r="5"/>
  </g>

  <!-- Vertex index labels -->
  <g font-family="Arial, sans-serif" font-size="11.5" fill="#222">
    <text x="30"  y="368">0</text>
    <text x="164" y="272">1</text>
    <text x="250" y="258" fill="#E65100">2</text>
    <text x="288" y="200">3</text>
    <text x="368" y="202">4</text>
    <text x="432" y="162" fill="#E65100">5</text>
    <text x="466" y="130">6</text>
    <text x="518" y="97"> 7</text>
  </g>

  <!-- Segment type call-outs -->
  <!-- Line 0→1 -->
  <text x="62"  y="327" font-family="Arial, sans-serif" font-size="9.5" fill="#1565C0" font-style="italic">IfcLineIndex[0,1]</text>
  <!-- Arc 1→2→3 -->
  <text x="208" y="278" font-family="Arial, sans-serif" font-size="9.5" fill="#E65100" font-style="italic">IfcArcIndex[1,2,3]</text>
  <!-- Line 3→4 -->
  <text x="308" y="225" font-family="Arial, sans-serif" font-size="9.5" fill="#1565C0" font-style="italic">IfcLineIndex[3,4]</text>
  <!-- Arc 4→5→6 -->
  <text x="377" y="183" font-family="Arial, sans-serif" font-size="9.5" fill="#E65100" font-style="italic">IfcArcIndex[4,5,6]</text>
  <!-- Line 6→7 -->
  <text x="467" y="128" font-family="Arial, sans-serif" font-size="9.5" fill="#1565C0" font-style="italic">IfcLineIndex[6,7]</text>

  <!-- North arrow -->
  <g transform="translate(530,365)" font-family="Arial, sans-serif" font-size="10" fill="#666" stroke="#666">
    <line x1="0" y1="18" x2="0" y2="-2" stroke-width="1.5"/>
    <polygon points="0,-8 -4,2 0,-1 4,2" fill="#666" stroke="none"/>
    <text x="-4" y="28">N</text>
  </g>

  <!-- Legend -->
  <rect x="15" y="15" width="230" height="80" fill="white" stroke="#ccc" rx="4" fill-opacity="0.95"/>
  <!-- Line entry -->
  <line x1="25" y1="36" x2="75" y2="36" stroke="#1565C0" stroke-width="2.5"/>
  <circle cx="50" cy="36" r="4.5" fill="#222" stroke="white" stroke-width="1.5"/>
  <text x="83" y="40" font-family="Arial, sans-serif" font-size="11" fill="#333">IfcLineIndex (tangent)</text>
  <!-- Arc entry -->
  <path d="M 25,60 Q 50,50 75,60" stroke="#E65100" stroke-width="2.5" fill="none"/>
  <circle cx="50" cy="57" r="4.5" fill="white" stroke="#E65100" stroke-width="2"/>
  <text x="83" y="64" font-family="Arial, sans-serif" font-size="11" fill="#333">IfcArcIndex (circular arc)</text>
  <!-- Note -->
  <text x="25" y="84" font-family="Arial, sans-serif" font-size="9.5" fill="#666">&#x25CB; = arc midpoint (through-point)</text>
</svg>
