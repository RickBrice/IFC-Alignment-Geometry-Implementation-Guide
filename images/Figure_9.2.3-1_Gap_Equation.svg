<svg width="760" height="180" viewBox="0 0 760 180" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Station gap equation</title>
  <desc>The alignment arrives with incoming station Sta. 142+35.75. At the equation point the station jumps forward to Sta. 145+00.00, a gap of 264.25 ft of stationing that is skipped.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; }
      .row-lbl { font-size: 12px; fill: #555; }
      .sta-lbl  { font-size: 13px; font-weight: 500; fill: #1a1a1a; }
      .box-h    { font-size: 14px; font-weight: 500; fill: #7C3D0A; }
      .box-d    { font-size: 11px; fill: #B45309; }
    </style>
  </defs>

  <!-- Row labels -->
  <text class="row-lbl" x="10" y="65" dominant-baseline="middle">Incoming:</text>
  <text class="row-lbl" x="10" y="135" dominant-baseline="middle">Outgoing:</text>

  <!-- Direction chevron at start of incoming line -->
  <path d="M92,60 L100,65 L92,70" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Incoming horizontal line -->
  <line x1="100" y1="65" x2="450" y2="65" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Incoming station label (above line, right portion) -->
  <text class="sta-lbl" x="320" y="47" text-anchor="middle">Sta. 142+35.75</text>

  <!-- Vertical connector at equation point -->
  <line x1="450" y1="65" x2="450" y2="135" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Outgoing horizontal line with arrowhead -->
  <line x1="450" y1="135" x2="738" y2="135" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Outgoing station label (below outgoing line) -->
  <text class="sta-lbl" x="560" y="158" text-anchor="middle">Sta. 145+00.00</text>

  <!-- GAP annotation box -->
  <rect x="465" y="72" width="283" height="56" rx="6" fill="#FEF3E2" stroke="#B45309" stroke-width="1.5"/>
  <text class="box-h" x="606" y="92" text-anchor="middle" dominant-baseline="central">GAP</text>
  <text class="box-d" x="606" y="111" text-anchor="middle" dominant-baseline="central">264.25 ft of stationing skipped</text>

</svg>
