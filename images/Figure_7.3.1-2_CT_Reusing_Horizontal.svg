<svg width="860" height="360" viewBox="0 0 860 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>CT 4.1.4.4.1.2 — vertical layouts moved into child alignments aggregated under the parent</title>
  <desc>IfcAlignment (parent) nests IfcAlignmentHorizontal via IfcRelNests and aggregates two child IfcAlignment instances via IfcRelAggregates. Each child nests its own IfcAlignmentVertical via IfcRelNests.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 500; }
      .ts  { font-size: 12px; font-weight: 400; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th  { fill: #3C3489; }
      .c-purple .ts  { fill: #534AB7; }
      .c-gray rect   { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th    { fill: #2C2C2A; }
      .c-gray .ts    { fill: #5F5E5A; }
      .c-amber rect  { fill: #FEF3E2; stroke: #B45309; }
      .c-amber .th   { fill: #7C3D0A; }
      .c-amber .ts   { fill: #B45309; }
      .c-blue rect   { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th    { fill: #0C447C; }
      .c-blue .ts    { fill: #185FA5; }
      .muted { fill: #888; font-size: 11px; }
    </style>
  </defs>

  <!-- IfcAlignment (parent) -->
  <g class="c-purple">
    <rect x="330" y="20" width="200" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="430" y="38" text-anchor="middle" dominant-baseline="central">IfcAlignment</text>
    <text class="ts" x="430" y="56" text-anchor="middle" dominant-baseline="central">(parent)</text>
  </g>

  <!-- Arrow: parent → IfcRelNests -->
  <path d="M375 64 L175 114" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="muted" x="255" y="88" text-anchor="middle">RelatingObject</text>

  <!-- Arrow: parent → IfcRelAggregates -->
  <path d="M490 64 L655 114" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="muted" x="594" y="88" text-anchor="middle">RelatingObject</text>

  <!-- IfcRelNests (horizontal layout) -->
  <g class="c-gray">
    <rect x="55" y="116" width="240" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="175" y="133" text-anchor="middle" dominant-baseline="central">IfcRelNests</text>
    <text class="ts" x="175" y="151" text-anchor="middle" dominant-baseline="central">(horizontal layout)</text>
  </g>

  <!-- IfcRelAggregates -->
  <g class="c-amber">
    <rect x="545" y="116" width="240" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="665" y="133" text-anchor="middle" dominant-baseline="central">IfcRelAggregates</text>
    <text class="ts" x="665" y="151" text-anchor="middle" dominant-baseline="central">(child alignments)</text>
  </g>

  <!-- Arrow: IfcRelNests → IfcAlignmentHorizontal -->
  <path d="M175 160 L175 210" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="muted" x="183" y="188">RelatedObjects</text>

  <!-- IfcAlignmentHorizontal (shared) -->
  <g class="c-blue">
    <rect x="40" y="212" width="270" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="175" y="229" text-anchor="middle" dominant-baseline="central">IfcAlignmentHorizontal</text>
    <text class="ts" x="175" y="247" text-anchor="middle" dominant-baseline="central">(shared)</text>
  </g>

  <!-- Spine: IfcRelAggregates → branch to child A (430) and child B (690) -->
  <path d="M665 160 L665 186 L430 186" fill="none" stroke="#888" stroke-width="1"/>
  <path d="M665 186 L690 186" fill="none" stroke="#888" stroke-width="1"/>
  <path d="M430 186 L430 212" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M690 186 L690 212" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="muted" x="560" y="180" text-anchor="middle">RelatedObjects</text>

  <!-- Child alignment A -->
  <g class="c-purple">
    <rect x="320" y="214" width="220" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="430" y="231" text-anchor="middle" dominant-baseline="central">IfcAlignment</text>
    <text class="ts" x="430" y="249" text-anchor="middle" dominant-baseline="central">(child for V1)</text>
  </g>

  <!-- Child alignment B -->
  <g class="c-purple">
    <rect x="580" y="214" width="220" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="690" y="231" text-anchor="middle" dominant-baseline="central">IfcAlignment</text>
    <text class="ts" x="690" y="249" text-anchor="middle" dominant-baseline="central">(child for V2)</text>
  </g>

  <!-- Arrow: child A → IfcAlignmentVertical V1 -->
  <path d="M430 258 L430 304" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="muted" x="438" y="284">IfcRelNests</text>

  <!-- Arrow: child B → IfcAlignmentVertical V2 -->
  <path d="M690 258 L690 304" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="muted" x="698" y="284">IfcRelNests</text>

  <!-- IfcAlignmentVertical V1 -->
  <g class="c-blue">
    <rect x="300" y="306" width="260" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="430" y="323" text-anchor="middle" dominant-baseline="central">IfcAlignmentVertical</text>
    <text class="ts" x="430" y="341" text-anchor="middle" dominant-baseline="central">(V1)</text>
  </g>

  <!-- IfcAlignmentVertical V2 -->
  <g class="c-blue">
    <rect x="560" y="306" width="260" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="690" y="323" text-anchor="middle" dominant-baseline="central">IfcAlignmentVertical</text>
    <text class="ts" x="690" y="341" text-anchor="middle" dominant-baseline="central">(V2)</text>
  </g>

</svg>
