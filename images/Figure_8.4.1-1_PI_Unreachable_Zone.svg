<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Plan view: two tangents at PI with unreachable zone and offset annotations</title>
  <desc>Two alignment tangents meet at PI. The unreachable zone is bounded by perpendiculars to each tangent emanating from the PI. Point Q lies inside this zone.</desc>

  <defs>
    <style>
      text { font-family: sans-serif; fill: #3d3d3a; }
      .th  { font-size: 14px; font-weight: 500; }
      .ts  { font-size: 12px; font-weight: 400; }
    </style>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <pattern id="hz" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#993C1D" stroke-width="0.7" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Unreachable zone -->
  <polygon points="310,260 640,147 640,560 610,560"
           fill="#993C1D" opacity="0.10"/>
  <polygon points="310,260 640,147 640,560 610,560"
           fill="url(#hz)"/>

  <!-- Tangent 1: solid, lower-left to PI -->
  <line x1="100" y1="470" x2="310" y2="260"
        stroke="#73726c" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Tangent 2: solid, PI to upper-left -->
  <line x1="310" y1="260" x2="251" y2="88"
        stroke="#73726c" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Perpendicular to T1 at PI: SE direction toward (610,560) -->
  <line x1="310" y1="260" x2="610" y2="560"
        stroke="#73726c" stroke-width="1.2" stroke-dasharray="5 4"
        opacity="0.55" stroke-linecap="round"/>

  <!-- Perpendicular to T2 at PI: ENE direction toward (640,147) -->
  <line x1="310" y1="260" x2="640" y2="147"
        stroke="#73726c" stroke-width="1.2" stroke-dasharray="5 4"
        opacity="0.55" stroke-linecap="round"/>

  <!-- Station direction arrows -->
  <line x1="210" y1="378" x2="250" y2="338"
        stroke="#73726c" stroke-width="1" marker-end="url(#ag)"/>
  <line x1="295" y1="210" x2="270" y2="140"
        stroke="#73726c" stroke-width="1" marker-end="url(#ag)"/>

  <!-- PI point -->
  <circle cx="310" cy="260" r="9" fill="none" stroke="#73726c" stroke-width="1" opacity="0.4"/>
  <circle cx="310" cy="260" r="5" fill="#3d3d3a" opacity="0.85"/>
  <text class="th" x="318" y="256" fill="#3d3d3a">PI</text>

  <!-- Tangent labels -->
  <text class="ts" x="96" y="484" fill="#73726c">Tangent 1</text>
  <text class="ts" x="236" y="88" fill="#73726c" text-anchor="end">Tangent 2</text>

  <!-- Unreachable zone label -->
  <text class="th" x="560" y="380" fill="#712B13" text-anchor="middle">Unreachable</text>
  <text class="ts" x="560" y="397" fill="#712B13" text-anchor="middle">zone</text>

  <!-- P=(150,420) on T1 -->
  <circle cx="150" cy="420" r="5" fill="#444441" opacity="0.85"/>
  <text class="ts" x="136" y="424" fill="#73726c" text-anchor="end">P</text>

  <!-- DistanceAlong: dashed, from (100,470) to P=(150,420), exactly along T1 -->
  <line x1="100" y1="470" x2="144" y2="426"
        stroke="#185FA5" stroke-width="2.2" stroke-dasharray="6 4"
        marker-end="url(#a1)" stroke-linecap="round"/>
  <text class="ts" font-style="italic" fill="#185FA5"
        text-anchor="middle" dominant-baseline="auto"
        transform="translate(114,440) rotate(-45)">DistanceAlong</text>

  <!-- Right-angle tick at P -->
  <path d="M 155.7 414.3 L 161.4 420.0 L 155.7 425.7"
        fill="none" stroke="#888780" stroke-width="0.8" opacity="0.6"/>

  <!-- OffsetLateral: P=(150,420) to Plat=(221,491), dir SE -->
  <line x1="150" y1="420" x2="215" y2="485"
        stroke="#0F6E56" stroke-width="2.2" stroke-dasharray="6 4"
        marker-end="url(#a3)" stroke-linecap="round"/>
  <text class="ts" font-style="italic" fill="#0F6E56"
        text-anchor="middle" dominant-baseline="auto"
        transform="translate(174,461) rotate(45)">OffsetLateral</text>

  <!-- Right-angle tick at Plat=(221,491) -->
  <path d="M 215.3 485.3 L 221.0 479.6 L 226.7 485.3"
        fill="none" stroke="#888780" stroke-width="0.8" opacity="0.6"/>

  <!-- OffsetLongitudinal: Plat=(221,491) to Q=(433,279), dir T1_fwd -->
  <line x1="221" y1="491" x2="427" y2="285"
        stroke="#854F0B" stroke-width="2.2" stroke-dasharray="6 4"
        marker-end="url(#a2)" stroke-linecap="round"/>
  <text class="ts" font-style="italic" fill="#854F0B"
        text-anchor="middle" dominant-baseline="auto"
        transform="translate(316,380) rotate(-45)">OffsetLongitudinal</text>

  <!-- Q=(433,279) -->
  <circle cx="433" cy="279" r="9" fill="none" stroke="#534AB7" stroke-width="1" opacity="0.4"/>
  <circle cx="433" cy="279" r="5" fill="#534AB7" opacity="0.9"/>
  <text class="th" x="445" y="275" fill="#534AB7">Q</text>

  <!-- Legend -->
  <rect x="36" y="130" width="200" height="150" rx="8"
        fill="#f1efe8" opacity="0.93" stroke="#b4b2a9" stroke-width="0.5"/>
  <text class="th" x="52" y="152" fill="#3d3d3a">Legend</text>
  <line x1="52" y1="170" x2="88" y2="170" stroke="#185FA5" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#a1)"/>
  <text class="ts" x="96" y="174" fill="#3d3d3a" font-style="italic">DistanceAlong</text>
  <line x1="52" y1="192" x2="88" y2="192" stroke="#0F6E56" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#a3)"/>
  <text class="ts" x="96" y="196" fill="#3d3d3a" font-style="italic">OffsetLateral</text>
  <line x1="52" y1="214" x2="88" y2="214" stroke="#854F0B" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#a2)"/>
  <text class="ts" x="96" y="218" fill="#3d3d3a" font-style="italic">OffsetLongitudinal</text>
  <rect x="52" y="228" width="12" height="12" fill="#993C1D" opacity="0.18"/>
  <line x1="52" y1="228" x2="64" y2="240" stroke="#993C1D" stroke-width="0.5" opacity="0.45"/>
  <text class="ts" x="72" y="238" fill="#3d3d3a">Unreachable zone</text>
  <circle cx="58" cy="256" r="4" fill="#534AB7" opacity="0.85"/>
  <text class="ts" x="72" y="260" fill="#3d3d3a">Q &#x2014; placed point</text>
</svg>
